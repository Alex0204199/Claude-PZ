const editorState = {
  active: false,
  nodes: {},
  regions: JSON.parse(JSON.stringify(WORLD_CONFIG.regions)),
  tool: 'building',
  selectedType: 'house',
  subType: 'road',
  brushElevation: 0,
  brushRegion: 'suburbs',
  panX: 0, panY: 0, zoom: 1.0,
  hoverGX: -1, hoverGY: -1,
  history: [],
  fileName: 'Новая карта',
  animFrame: null,
};

function openMapEditor(mode) {
  if (mode === 'current' && G?.world?.nodes) {
    editorState.nodes = JSON.parse(JSON.stringify(G.world.nodes));
    editorState.fileName = 'Текущий мир';
  } else if (mode === 'load') {
    // handled by editorLoadMap
    return;
  } else {
    editorState.nodes = {};
    editorState.fileName = 'Новая карта';
  }
  editorState.active = true;
  editorState.panX = 0; editorState.panY = 0; editorState.zoom = 1.0;

  // Hide title screen, show editor
  document.getElementById('title-screen').style.display = 'none';

  // Create editor overlay
  let edDiv = document.getElementById('map-editor');
  if (!edDiv) {
    edDiv = document.createElement('div');
    edDiv.id = 'map-editor';
    edDiv.style.cssText = 'position:fixed;inset:0;z-index:5000;background:#000;display:flex;flex-direction:column;font-family:monospace';
    document.body.appendChild(edDiv);
  }
  edDiv.style.display = 'flex';
  renderEditorUI();
}

function closeMapEditor() {
  editorState.active = false;
  const edDiv = document.getElementById('map-editor');
  if (edDiv) edDiv.style.display = 'none';
  if (editorState.animFrame) { cancelAnimationFrame(editorState.animFrame); editorState.animFrame = null; }
  document.getElementById('title-screen').style.display = '';
}

      <div id="ed-type-select" style="flex:1;min-width:120px">

      </div>

      </div>

        <span id="ed-node-count">${Object.keys(editorState.nodes).length}</span> яч. · <span id="ed-bldg-count">${Object.values(editorState.nodes).filter(n=>n.type==='building').length}</span> зд.

function editorSetTool(toolId) {
  editorState.tool = toolId;
  // Highlight active tool
  document.querySelectorAll('#ed-tools .act-btn').forEach(b => {
    b.style.borderColor = ''; b.style.background = '';
  });
  const active = document.getElementById('ed-tool-' + toolId);
  if (active) { active.style.borderColor = 'var(--cyan)'; active.style.background = 'rgba(0,229,255,.1)'; }
  // Show/hide property selectors
  ['ed-type-select','ed-road-select','ed-nature-select','ed-poi-select','ed-elev-select','ed-region-select'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  if (toolId === 'building') document.getElementById('ed-type-select').style.display = '';
  else if (toolId === 'road') document.getElementById('ed-road-select').style.display = '';
  else if (toolId === 'nature') document.getElementById('ed-nature-select').style.display = '';
  else if (toolId === 'poi') document.getElementById('ed-poi-select').style.display = '';
  else if (toolId === 'elevation') document.getElementById('ed-elev-select').style.display = '';
  else if (toolId === 'region') document.getElementById('ed-region-select').style.display = '';
}

function initEditorCanvas() {
  const canvas = document.getElementById('ed-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // Pan with drag (mouse + touch)
  let dragging = false, wasDragging = false, dragX = 0, dragY = 0;
  let dragTotalDist = 0, lastTapTime = 0;

  function edPointerDown(cx, cy) {
    dragging = true; wasDragging = false; dragTotalDist = 0;
    dragX = cx; dragY = cy;
  }
  function edPointerMove(cx, cy) {
    if (!dragging) return;
    const dx = cx - dragX, dy = cy - dragY;
    dragTotalDist += Math.abs(dx) + Math.abs(dy);
    if (dragTotalDist > 8) wasDragging = true;
    editorState.panX += dx; editorState.panY += dy;
    dragX = cx; dragY = cy;
  }
  function edPointerUp() { dragging = false; }
  function edTap(cx, cy) {
    if (wasDragging) return;
    const now = Date.now();
    if (now - lastTapTime < 300) return; // prevent double-fire from touch+click
    lastTapTime = now;
    const rect = canvas.getBoundingClientRect();
    const mx = cx - rect.left, my = cy - rect.top;
    const cell = edScreenToGrid(mx, my, canvas);
    if (cell.gx < 0 || cell.gx >= WORLD_CONFIG.gridW || cell.gy < 0 || cell.gy >= WORLD_CONFIG.gridH) return;
    editorPlaceTool(cell.gx, cell.gy);
  }

  // Mouse events
  canvas.addEventListener('mousedown', e => edPointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => edPointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', () => edPointerUp());
  canvas.addEventListener('click', e => edTap(e.clientX, e.clientY));

  // Touch events
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    edPointerDown(t.clientX, t.clientY);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    edPointerMove(t.clientX, t.clientY);
    // Update hover info on touch
    const rect = canvas.getBoundingClientRect();
    const mx = t.clientX - rect.left, my = t.clientY - rect.top;
    const cell = edScreenToGrid(mx, my, canvas);
    editorState.hoverGX = cell.gx; editorState.hoverGY = cell.gy;
    const info = document.getElementById('ed-hover-info');
    const nid = `n_${cell.gx}_${cell.gy}`;
    const node = editorState.nodes[nid];
    if (info) info.textContent = `[${cell.gx}, ${cell.gy}]${node ? ' · ' + (node.name || node.type) : ' · пусто'}`;
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    edPointerUp();
    edTap(t.clientX, t.clientY);
  }, { passive: false });

  // Zoom with wheel
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    editorState.zoom = Math.max(0.3, Math.min(4, editorState.zoom + (e.deltaY < 0 ? 0.15 : -0.15)));
  }, { passive: false });

  // Hover — show cell coords (mouse only)
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const cell = edScreenToGrid(mx, my, canvas);
    editorState.hoverGX = cell.gx; editorState.hoverGY = cell.gy;
    const info = document.getElementById('ed-hover-info');
    const nid = `n_${cell.gx}_${cell.gy}`;
    const node = editorState.nodes[nid];
    if (info) {
      info.textContent = `[${cell.gx}, ${cell.gy}]${node ? ' · ' + (node.name || node.type) : ' · пусто'}`;
    }
  });

  // Render loop
  function edRender() {
    if (!editorState.active) return;
    const w = canvas.width / dpr, h = canvas.height / dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#020602';
    ctx.fillRect(0, 0, w, h);

    const z = editorState.zoom;
    const halfTW = WORLD_CONFIG.cellPx * z;
    const halfTH = halfTW / 2;

    function eiX(gx, gy) { return (gx - gy) * halfTW + editorState.panX + w / 2; }
    function eiY(gx, gy) { return (gx + gy) * halfTH + editorState.panY + h * 0.3; }

    // Grid
    ctx.strokeStyle = 'rgba(0,255,65,0.04)';
    ctx.lineWidth = 0.3;
    for (let i = 0; i <= WORLD_CONFIG.gridW; i++) {
      ctx.beginPath(); ctx.moveTo(eiX(i,0),eiY(i,0)); ctx.lineTo(eiX(i,WORLD_CONFIG.gridH),eiY(i,WORLD_CONFIG.gridH)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eiX(0,i),eiY(0,i)); ctx.lineTo(eiX(WORLD_CONFIG.gridW,i),eiY(WORLD_CONFIG.gridW,i)); ctx.stroke();
    }

    // Region borders
    ctx.strokeStyle = 'rgba(0,255,65,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    for (const r of WORLD_CONFIG.regions) {
      const x1 = eiX(r.gx, r.gy), y1 = eiY(r.gx, r.gy);
      const x2 = eiX(r.gx+r.w, r.gy), y2 = eiY(r.gx+r.w, r.gy);
      const x3 = eiX(r.gx+r.w, r.gy+r.h), y3 = eiY(r.gx+r.w, r.gy+r.h);
      const x4 = eiX(r.gx, r.gy+r.h), y4 = eiY(r.gx, r.gy+r.h);
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4); ctx.closePath(); ctx.stroke();
      // Region label
      const cx = eiX(r.gx+r.w/2, r.gy+r.h/2), cy = eiY(r.gx+r.w/2, r.gy+r.h/2);
      ctx.fillStyle = 'rgba(0,255,65,0.08)';
      ctx.font = `bold ${Math.max(8,10*z)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(r.name.toUpperCase(), cx, cy);
    }
    ctx.setLineDash([]);

    // Nodes
    const nodes = editorState.nodes;
    const sortedIds = Object.keys(nodes).sort((a,b) => {
      const na = nodes[a], nb = nodes[b];
      return (na.gx+na.gy) - (nb.gx+nb.gy);
    });

    for (const nid of sortedIds) {
      const n = nodes[nid];
      const pad = 0.06;
      const bw = n.buildingW || 1, bh = n.buildingH || 1;
      const elevOff = (n.elevation || 0) * halfTH * 0.5;

      const N = { x: eiX(n.gx+pad, n.gy+pad), y: eiY(n.gx+pad, n.gy+pad) - elevOff };
      const E = { x: eiX(n.gx+bw-pad, n.gy+pad), y: eiY(n.gx+bw-pad, n.gy+pad) - elevOff };
      const S = { x: eiX(n.gx+bw-pad, n.gy+bh-pad), y: eiY(n.gx+bw-pad, n.gy+bh-pad) - elevOff };
      const W = { x: eiX(n.gx+pad, n.gy+bh-pad), y: eiY(n.gx+pad, n.gy+bh-pad) - elevOff };

      if (n.type === 'water') {
        // Water — blue diamond
        ctx.beginPath(); ctx.moveTo(N.x,N.y); ctx.lineTo(E.x,E.y); ctx.lineTo(S.x,S.y); ctx.lineTo(W.x,W.y); ctx.closePath();
        ctx.fillStyle = 'rgba(26,51,102,0.5)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(60,120,200,0.4)'; ctx.lineWidth = 0.5; ctx.stroke();
      } else if (n.type === 'building' && n.building) {
        const meta = BUILDING_META[n.building.type] || {color:'#337744'};
        const bldH = (BLD_H[n.building.type]||2) * halfTH * 0.85;
        // Right wall
        ctx.beginPath(); ctx.moveTo(E.x,E.y); ctx.lineTo(S.x,S.y);
        ctx.lineTo(S.x,S.y-bldH); ctx.lineTo(E.x,E.y-bldH); ctx.closePath();
        ctx.fillStyle = scaleColor(meta.color, 0.48); ctx.fill();
        // Left wall
        ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(W.x,W.y);
        ctx.lineTo(W.x,W.y-bldH); ctx.lineTo(S.x,S.y-bldH); ctx.closePath();
        ctx.fillStyle = scaleColor(meta.color, 0.25); ctx.fill();
        // Roof
        ctx.beginPath(); ctx.moveTo(N.x,N.y-bldH); ctx.lineTo(E.x,E.y-bldH);
        ctx.lineTo(S.x,S.y-bldH); ctx.lineTo(W.x,W.y-bldH); ctx.closePath();
        ctx.fillStyle = scaleColor(meta.color, 0.85); ctx.fill();
        // Edge
        ctx.strokeStyle = 'rgba(0,255,65,0.2)'; ctx.lineWidth = 0.5;
        ctx.stroke();
      } else if (n.type === 'road' || n.type === 'intersection' || n.type === 'alley') {
        ctx.beginPath(); ctx.moveTo(N.x,N.y); ctx.lineTo(E.x,E.y); ctx.lineTo(S.x,S.y); ctx.lineTo(W.x,W.y); ctx.closePath();
        ctx.fillStyle = n.type==='alley' ? '#0e1a0e' : '#14201a';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,65,0.08)'; ctx.lineWidth = 0.4; ctx.stroke();
      } else {
        // Other POI
        const nt = NODE_TYPES[n.type];
        ctx.beginPath(); ctx.moveTo(N.x,N.y); ctx.lineTo(E.x,E.y); ctx.lineTo(S.x,S.y); ctx.lineTo(W.x,W.y); ctx.closePath();
        ctx.fillStyle = nt?.color || '#1a3a1a';
        ctx.globalAlpha = 0.5; ctx.fill(); ctx.globalAlpha = 1;
      }
    }

    // Hover cell highlight
    if (editorState.hoverGX >= 0 && editorState.hoverGX < WORLD_CONFIG.gridW &&
        editorState.hoverGY >= 0 && editorState.hoverGY < WORLD_CONFIG.gridH) {
      const hx = editorState.hoverGX, hy = editorState.hoverGY;
      const hN = { x: eiX(hx, hy), y: eiY(hx, hy) };
      const hE = { x: eiX(hx+1, hy), y: eiY(hx+1, hy) };
      const hS = { x: eiX(hx+1, hy+1), y: eiY(hx+1, hy+1) };
      const hW = { x: eiX(hx, hy+1), y: eiY(hx, hy+1) };
      ctx.beginPath(); ctx.moveTo(hN.x,hN.y); ctx.lineTo(hE.x,hE.y); ctx.lineTo(hS.x,hS.y); ctx.lineTo(hW.x,hW.y); ctx.closePath();
      ctx.strokeStyle = 'rgba(0,229,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = 'rgba(0,229,255,0.08)'; ctx.fill();
    }

    editorState.animFrame = requestAnimationFrame(edRender);
  }

  editorState.animFrame = requestAnimationFrame(edRender);
}

function edScreenToGrid(mx, my, canvas) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const z = editorState.zoom;
  const halfTW = WORLD_CONFIG.cellPx * z;
  const halfTH = halfTW / 2;
  const relX = mx - editorState.panX - w / 2;
  const relY = my - editorState.panY - h * 0.3;
  const gxf = (relX / halfTW + relY / halfTH) / 2;
  const gyf = (relY / halfTH - relX / halfTW) / 2;
  return { gx: Math.floor(gxf), gy: Math.floor(gyf) };
}

function editorPlaceTool(gx, gy) {
  const nid = `n_${gx}_${gy}`;
  const tool = editorState.tool;

  if (tool === 'eraser') {
    delete editorState.nodes[nid];
    // Also delete connections
    Object.values(editorState.nodes).forEach(n => {
      n.connections = (n.connections||[]).filter(c => c !== nid);
    });
  } else if (tool === 'building') {
    const bType = editorState.selectedType;
    const meta = BUILDING_META[bType] || {w:1,h:1};
    const bldNum = Object.values(editorState.nodes).filter(n=>n.type==='building').length+1;
    const bldName = (LOCATION_TEMPLATES[bType]?.name||bType)+' #'+bldNum;
    let bld = null;
    try { if (typeof generateBuilding === 'function' && G?.difficulty) bld = generateBuilding(bType, Object.keys(editorState.nodes).length); } catch(e) {}
    if (!bld) bld = { id:'bld-ed-'+Date.now()+'-'+bldNum, type:bType, name:bldName, rooms:[{id:'room-0',name:'Комната',floorNum:0,roomType:'room',containers:[],enemies:[],searched:false}], infest:1, condition:'intact' };
    editorState.nodes[nid] = {
      id: nid, gx, gy, type: 'building', regionId: editorState.brushRegion,
      name: bld?.name || bType, building: bld, buildingW: meta.w, buildingH: meta.h,
      connections: [], discovered: true, visited: true, elevation: editorState.brushElevation,
    };
    // Auto-connect to adjacent roads
    edAutoConnect(gx, gy);
  } else if (tool === 'road') {
    const subType = editorState.subType || 'road';
    const nt = NODE_TYPES[subType] || NODE_TYPES.road;
    editorState.nodes[nid] = {
      id: nid, gx, gy, type: subType, regionId: editorState.brushRegion,
      name: nt.name, connections: [], discovered: true, visited: true,
      traverseTime: nt.time, dangerLevel: nt.danger, elevation: editorState.brushElevation,
    };
    edAutoConnect(gx, gy);
  } else if (tool === 'water') {
    editorState.nodes[nid] = {
      id: nid, gx, gy, type: 'water', regionId: editorState.brushRegion,
      name: 'Водоём', connections: [], discovered: true, visited: true,
      blocked: true, elevation: editorState.brushElevation,
    };
  } else if (tool === 'nature') {
    const subType = editorState.subType || 'park';
    const nt = NODE_TYPES[subType] || NODE_TYPES.park;
    editorState.nodes[nid] = {
      id: nid, gx, gy, type: subType, regionId: editorState.brushRegion,
      name: nt.name, connections: [], discovered: true, visited: true,
      traverseTime: nt.time, dangerLevel: nt.danger, elevation: editorState.brushElevation,
    };
  } else if (tool === 'poi') {
    const subType = editorState.subType || 'car_wreck';
    const nt = NODE_TYPES[subType] || {};
    editorState.nodes[nid] = {
      id: nid, gx, gy, type: subType, regionId: editorState.brushRegion,
      name: nt.name || subType, connections: [], discovered: true, visited: true,
      traverseTime: nt.time, dangerLevel: nt.danger, blocked: nt.blocked||false,
      elevation: editorState.brushElevation,
    };
  } else if (tool === 'elevation') {
    if (editorState.nodes[nid]) {
      editorState.nodes[nid].elevation = editorState.brushElevation;
    }
  } else if (tool === 'region') {
    if (editorState.nodes[nid]) {
      editorState.nodes[nid].regionId = editorState.brushRegion;
    }
  }

  // Update counts
  const countEl = document.getElementById('ed-node-count');
  const bldgEl = document.getElementById('ed-bldg-count');
  if (countEl) countEl.textContent = Object.keys(editorState.nodes).length;
  if (bldgEl) bldgEl.textContent = Object.values(editorState.nodes).filter(n=>n.type==='building').length;
}

function edAutoConnect(gx, gy) {
  const nid = `n_${gx}_${gy}`;
  const node = editorState.nodes[nid];
  if (!node) return;
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dx,dy] of dirs) {
    const adjId = `n_${gx+dx}_${gy+dy}`;
    const adj = editorState.nodes[adjId];
    if (!adj) continue;
    if (!node.connections.includes(adjId)) node.connections.push(adjId);
    if (!adj.connections.includes(nid)) adj.connections.push(nid);
  }
}

// Save/Load/Export/Import
function editorSave() {
  const data = { nodes: editorState.nodes, regions: editorState.regions, fileName: editorState.fileName };
  localStorage.setItem('echo7_editor_map', JSON.stringify(data));
  if (typeof addLog === 'function') addLog('Карта сохранена в редакторе.', 'success');
}

function editorLoadMap() {
  try {
    const raw = localStorage.getItem('echo7_editor_map');
    if (!raw) { alert('Нет сохранённой карты.'); return; }
    const data = JSON.parse(raw);
    editorState.nodes = data.nodes || {};
    editorState.regions = data.regions || JSON.parse(JSON.stringify(WORLD_CONFIG.regions));
    editorState.fileName = data.fileName || 'Загруженная карта';
    openMapEditor('load');
  } catch(e) { alert('Ошибка загрузки карты.'); }
}

function editorExport() {
  const data = JSON.stringify({ nodes: editorState.nodes, regions: editorState.regions, fileName: editorState.fileName });
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (editorState.fileName || 'map') + '.json'; a.click();
  URL.revokeObjectURL(url);
}

function editorImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        editorState.nodes = data.nodes || {};
        editorState.regions = data.regions || JSON.parse(JSON.stringify(WORLD_CONFIG.regions));
        editorState.fileName = data.fileName || file.name;
        renderEditorUI();
      } catch(e) { alert('Ошибка импорта.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function editorPlay() {
  if (Object.keys(editorState.nodes).length === 0) { alert('Карта пуста!'); return; }
  closeMapEditor();
  // Find a road node to start on
  const roadNode = Object.values(editorState.nodes).find(n => n.type === 'road' || n.type === 'intersection');
  const startNode = roadNode || Object.values(editorState.nodes)[0];

  // Create minimal charData and start game with custom map
  const charData = { name:'Редактор', occupation:'unemployed', traits:[], difficulty:'normal', sandbox:null, editorNodes: editorState.nodes, editorStart: startNode.id };

  // Patch newGame to use editor nodes
  const origGenWorld = window._origGenWorld || generateWorld;
  window._origGenWorld = origGenWorld;
  window.generateWorld = function() {
    // Skip procedural gen — use editor nodes directly
    G.world.nodes = JSON.parse(JSON.stringify(charData.editorNodes));
    G.world.currentNodeId = charData.editorStart;
    // Ensure all nodes have required properties
    Object.values(G.world.nodes).forEach(n => {
      if (!n.connections) n.connections = [];
      if (n.discovered === undefined) n.discovered = true;
      if (n.visited === undefined) n.visited = false;
    });
  };
  newGame(charData);
  // Restore original
  window.generateWorld = origGenWorld;
}

// ═══════════════════════════════════════════
// WEB AUDIO ENGINE
// ═══════════════════════════════════════════
function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {}
}

function ensureAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  ensureAudio();
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    switch(type) {
      case 'step':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'scan':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.4);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        // Echo
        setTimeout(() => {
          const o2 = audioCtx.createOscillator();
          const g2 = audioCtx.createGain();
          o2.connect(g2); g2.connect(audioCtx.destination);
          o2.type = 'sine';
          o2.frequency.setValueAtTime(800, audioCtx.currentTime);
          o2.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
          g2.gain.setValueAtTime(0.04, audioCtx.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
          o2.start(); o2.stop(audioCtx.currentTime + 0.4);
        }, 200);
        break;
      case 'alert':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'hit':
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'damage':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'kill':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        break;
      case 'loot':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.setValueAtTime(800, now + 0.1);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'levelup':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        osc.frequency.setValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'craft':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(500, now + 0.15);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'rest':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
      case 'death':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 1.5);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
        osc.start(now); osc.stop(now + 2);
        break;
      case 'distract':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1000, now);
        osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      default:
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    }
  } catch(e) {}
}

// Heartbeat at low HP
function startHeartbeat() {
  if (!audioCtx || !G || !G.player.alive) return;
  const avgHp = getTotalHp();
  if (avgHp < 30) {
    const rate = avgHp < 15 ? 300 : 600;
    setTimeout(() => {
      if (!G || !G.player.alive) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(40, now);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      startHeartbeat();
    }, rate);
  } else {
    setTimeout(startHeartbeat, 2000);
  }
}

// ═══════════════════════════════════════════
// QUICK SLOTS
// ═══════════════════════════════════════════
function updateQuickSlots() {
  const panel = document.getElementById('quick-slots');
  if (!panel || !G?.player) { if(panel) panel.style.display='none'; return; }
  panel.style.display = 'flex';
  const qs = G.player.quickSlots || [null,null,null];
  panel.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const slot = qs[i];
    const div = document.createElement('div');
    div.className = 'qslot' + (slot ? ' has-item' : '');
    if (slot) {
      const def = ITEMS[slot.id];
      const invIt = G.player.inventory.find(it => it.id === slot.id);
      if (def && invIt) {
        div.innerHTML = itemIconHtml(slot.id, 20) + `<span>${def.name.substring(0,8)}</span>`;
        div.onclick = () => useQuickSlot(i);
      } else {
        qs[i] = null;
        div.innerHTML = '[—]';
      }
    } else {
      div.innerHTML = '[—]';
    }
    panel.appendChild(div);
  }
}

function useQuickSlot(slotIdx) {
  if (!G?.player) return;
  const slot = G.player.quickSlots?.[slotIdx];
  if (!slot) return;
  const idx = G.player.inventory.findIndex(it => it.id === slot.id);
  if (idx < 0) { G.player.quickSlots[slotIdx] = null; updateQuickSlots(); return; }
  const def = ITEMS[slot.id];
  if (!def) return;
  if (def.type === 'food') { useFood(idx); }
  else if (def.type === 'medicine') { useMedicine(idx); }
  else if (def.type === 'comfort') { useComfort(idx); }
  else if (def.type === 'weapon') { invEquipWeapon(idx); }
  else if (def.type === 'clothing') { invEquipClothing(idx); }
  updateQuickSlots();
  updateUI();
}

function generateDiaryEntry() {
  if (!G?.diary) G.diary = [];
  if (!G._dayStats) return;
  const ds = G._dayStats;
  const day = G.player.daysSurvived;
  const node = G.world.nodes[G.world.currentNodeId];
  const region = node?.regionId || 'неизвестно';
  const atBase = G.world.homeBase ? G.world.currentNodeId === G.world.homeBase : false;

  const templates = {
    opening: [`День ${day}.`, `Запись ${day}.`, `${day}-й день.`],
    location: [
      `Провёл день в районе ${region}.`,
      `Бродил по ${region}.`,
      `Исследовал ${region}.`,
      `Снова ${region}. Начинаю привыкать.`,
    ],
    kills0: ['Зомби не встретил — повезло.', 'Тихий день, без столкновений.', ''],
    kills1: ['Один зомби — справился.', 'Пришлось прикончить одного.'],
    killsMany: [`Убил ${ds.kills} зомби. Руки до сих пор трясутся.`, `${ds.kills} зомби. Патроны тают.`, `Тяжёлый день: ${ds.kills} мертвецов.`],
    hurt: ['Получил ранение — надо найти бинты.', 'Ранен, но жив.', 'Саднит всё тело после стычки.'],
    noHurt: ['Ни царапины.', ''],
    loot: ds.itemsFound > 5 ? [`Неплохой улов: ${ds.itemsFound} предметов.`] : ds.itemsFound > 0 ? [`Нашёл ${ds.itemsFound} предметов.`] : ['Ничего полезного не нашёл.'],
    base: atBase ? ['К ночи вернулся на базу. Здесь безопаснее.'] : ['Ночую где придётся.', 'Без базы тяжело.'],
    mood: G.player.moodles.depression > 50 ? ['Тоска накрывает.'] : G.player.moodles.hunger > 60 ? ['Живот сводит от голода.'] : [''],
  };

  const pick = arr => arr[Math.floor(Math.random()*arr.length)] || '';
  const killText = ds.kills === 0 ? pick(templates.kills0) : ds.kills === 1 ? pick(templates.kills1) : pick(templates.killsMany);
  const hurtText = ds.wasHurt ? pick(templates.hurt) : pick(templates.noHurt);

  const entry = [pick(templates.opening), pick(templates.location), killText, hurtText, pick(templates.loot), pick(templates.base), pick(templates.mood)].filter(s=>s).join(' ');

  G.diary.push({ day, text: entry });
  G._dayStats = { kills:0, itemsFound:0, nodesVisited:0, wasHurt:false, wasAtBase:false };
}

function showDiary() {
  if (!G?.diary || G.diary.length === 0) {
    openModal('Дневник', '<div style="text-align:center;color:var(--text-dim);padding:20px">Пока нет записей. Дневник обновляется каждый новый день.</div>');
    return;
  }
  let html = '<div style="max-height:60vh;overflow-y:auto">';
  for (let i = G.diary.length - 1; i >= 0; i--) {
    const e = G.diary[i];
    html += `<div style="margin-bottom:12px;padding:8px;border-left:2px solid var(--green-dim)">`;
    html += `<div style="color:var(--green);font-size:10px;letter-spacing:.1em;margin-bottom:4px">ДЕНЬ ${e.day}</div>`;
    html += `<div style="color:var(--text);font-size:11px;line-height:1.6">${e.text}</div>`;
    html += '</div>';
  }
  html += '</div>';
  openModal('Дневник выживания', html);
}

function invSort(mode) {
  if (!G?.player?.inventory) return;
  settings.invSort = mode;
  saveSettings();
  const typeOrder = {weapon:0,magazine:1,ammo:2,medicine:3,food:4,clothing:5,material:6,comfort:7,book:8,lore:9,throwable:10};
  G.player.inventory.sort((a, b) => {
    const da = ITEMS[a.id], db = ITEMS[b.id];
    if (!da || !db) return 0;
    switch(mode) {
      case 'type': return (typeOrder[da.type]||99) - (typeOrder[db.type]||99);
      case 'weight': return (db.weight||0) - (da.weight||0);
      case 'alpha': return (da.name||'').localeCompare(db.name||'','ru');
      case 'newest': return -1;
      default: return 0;
    }
  });
  if (mode === 'newest') G.player.inventory.reverse();
  G.player.inventory.forEach(it => { it.gridX = undefined; it.gridY = undefined; });
  showInventory();
}

// UI UPDATE
// ═══════════════════════════════════════════
function updateUI() {
  if (!G) return;

  // Time
  document.getElementById('game-time').textContent = getTimeString();
  const period = getTimePeriod();
  const timeEl = document.getElementById('game-time');
  timeEl.style.color = period === 'night' ? 'var(--red)' : period === 'dusk' ? 'var(--yellow)' : 'var(--green)';

  // Unsaved indicator
  const timeSinceSave = Date.now() - (G._lastSaveTime || Date.now());
  const unsavedEl = document.getElementById('unsaved-indicator');
  if (timeSinceSave > 600000) {
    if (!unsavedEl) {
      const ti = document.getElementById('game-time');
      if (ti) {
        const ind = document.createElement('span');
        ind.id = 'unsaved-indicator';
        ind.textContent = ' [UNSAVED]';
        ind.style.cssText = 'color:var(--red);font-size:9px;animation:blink 1s infinite';
        ti.appendChild(ind);
      }
    }
  } else if (unsavedEl) unsavedEl.remove();

  // Dynamic page title
  if (G?.world?.currentNodeId) {
    const cn = G.world.nodes[G.world.currentNodeId];
    document.title = `ECHO-7 | День ${G.player.daysSurvived} | ${cn?.name || cn?.building?.name || 'Мир'}`;
  }

  // Weight
  document.getElementById('weight-display').textContent = `${G.player.weight}/${maxWeight()} кг`;
  document.getElementById('weight-display').style.color = isEncumbered() ? 'var(--red)' : 'var(--text-dim)';

  // HP bar
  const hpBar = document.getElementById('hp-bar');
  const avgHp = getTotalHp();
  hpBar.innerHTML = '';
  if (!G._prevHpSegs) G._prevHpSegs = 10;
  const newSegs = Math.ceil(avgHp / 10);
  const hpChanged = newSegs !== G._prevHpSegs;
  const _oldHpSegs = G._prevHpSegs;
  G._prevHpSegs = newSegs;
  for (let i = 0; i < 10; i++) {
    const seg = document.createElement('div');
    seg.className = 'hp-seg';
    const threshold = i * 10;
    if (avgHp <= threshold) seg.classList.add('dead');
    else if (avgHp < threshold + 15) seg.classList.add('critical');
    else if (avgHp < threshold + 30) seg.classList.add('damaged');
    hpBar.appendChild(seg);
    if (hpChanged && i >= newSegs && i < _oldHpSegs + 1) {
      seg.style.animation = 'hpFlash .3s';
    }
  }

  // Noise indicator (left side)
  const noiseVal = Math.round(G.player.moodles.noise);
  const noiseFill = document.getElementById('noise-bar-fill');
  const noiseNum = document.getElementById('noise-value');
  if (noiseFill) {
    noiseFill.style.height = noiseVal + '%';
    noiseFill.style.background = noiseVal > 70 ? 'var(--red)' : noiseVal > 40 ? '#ff8800' : noiseVal > 15 ? 'var(--yellow)' : 'var(--green)';
  }
  if (noiseNum) noiseNum.textContent = noiseVal;

  // Health status label
  const healthStatusEl = document.getElementById('health-status');
  if (healthStatusEl) {
    let hLabel, hColor;
    if (avgHp >= 100) { hLabel = 'Отличное'; hColor = 'var(--green)'; }
    else if (avgHp >= 90) { hLabel = 'Незначит. урон'; hColor = '#88cc88'; }
    else if (avgHp >= 80) { hLabel = 'Незначит. урон'; hColor = '#88cc44'; }
    else if (avgHp >= 70) { hLabel = 'Лёгкий урон'; hColor = 'var(--yellow)'; }
    else if (avgHp >= 60) { hLabel = 'Умеренный урон'; hColor = '#ccaa00'; }
    else if (avgHp >= 50) { hLabel = 'Тяжёлый урон'; hColor = '#ff8800'; }
    else if (avgHp >= 40) { hLabel = 'Оч. тяжёлый'; hColor = '#ff6600'; }
    else if (avgHp >= 20) { hLabel = 'Критический!'; hColor = 'var(--red)'; }
    else if (avgHp >= 10) { hLabel = 'Весьма крит.!'; hColor = '#cc0033'; }
    else { hLabel = 'Смертельный!'; hColor = '#ff0044'; }
    healthStatusEl.textContent = hLabel;
    healthStatusEl.style.color = hColor;
    healthStatusEl.style.borderColor = hColor;
  }

  // Moodles
  const moodlesEl = document.getElementById('moodles');
  moodlesEl.innerHTML = '';
  const moodleConfig = [
    { key:'hunger', uiIcon:'moodle_hunger', name:'Голод' },
    { key:'thirst', uiIcon:'moodle_thirst', name:'Жажда' },
    { key:'fatigue', uiIcon:'moodle_fatigue', name:'Усталость' },
    { key:'depression', uiIcon:'moodle_depression', name:'Депрессия' },
    { key:'infection', uiIcon:'moodle_infection', name:'Заражение' },
    { key:'pain', uiIcon:'moodle_pain', name:'Боль' },
    { key:'panic', uiIcon:'moodle_panic', name:'Паника' },
  ];

  moodleConfig.forEach(mc => {
    const val = G.player.moodles[mc.key];
    const level = getMoodleLevel(val);
    if (level === 'ok') return;
    const div = document.createElement('div');
    div.className = `moodle ${level}`;
    div.innerHTML = `${uiIconHtml(mc.uiIcon,14)} ${mc.name}`;
    moodlesEl.appendChild(div);
  });
  if (G.player.moodles.bleeding > 0) {
    const div = document.createElement('div');
    div.className = 'moodle critical';
    div.innerHTML = `${uiIconHtml('moodle_pain',14)} Кровотечение`;
    moodlesEl.appendChild(div);
  }
  if (G.player.stealthMode) {
    const div = document.createElement('div');
    div.className = 'moodle';
    div.style.borderColor = 'var(--cyan)';
    div.style.color = 'var(--cyan)';
    div.textContent = '👁 Скрытность';
    moodlesEl.appendChild(div);
  }
  if (isEncumbered()) {
    const div = document.createElement('div');
    div.className = 'moodle severe';
    div.textContent = '⚖ Перегруз';
    moodlesEl.appendChild(div);
  }

  // Route progress indicator
  let routeEl = document.getElementById('route-indicator');
  if (!routeEl) {
    routeEl = document.createElement('div');
    routeEl.id = 'route-indicator';
    routeEl.style.cssText = 'font-size:10px;padding:4px 8px;margin:4px 0;border-radius:3px;display:none';
    const moodlesParent = moodlesEl.parentElement;
    if (moodlesParent) moodlesParent.insertBefore(routeEl, moodlesEl.nextSibling);
  }
  if (G.world.currentRoute) {
    const rt = G.world.currentRoute;
    const progress = rt.currentStep / Math.max(1, rt.path.length - 1);
    const pct = Math.round(progress * 100);
    const dest = G.world.nodes[rt.destinationId];
    const destNt = dest ? NODE_TYPES[dest.type] : null;
    const destName = dest ? (dest.name || destNt?.name || '???') : '???';
    routeEl.style.display = '';
    routeEl.style.border = `1px solid ${rt.paused ? 'var(--yellow)' : 'var(--cyan)'}`;
    routeEl.style.color = rt.paused ? 'var(--yellow)' : 'var(--cyan)';
    routeEl.innerHTML = `${rt.paused ? '⏸' : '►'} ${destName} · ${rt.currentStep}/${rt.path.length - 1} (${pct}%)`
      + `<div style="height:3px;background:rgba(0,0,0,.5);margin-top:3px;border-radius:2px"><div style="height:100%;width:${pct}%;background:${rt.paused ? 'var(--yellow)' : 'var(--cyan)'};border-radius:2px"></div></div>`;
  } else {
    routeEl.style.display = 'none';
  }

  // Current node info
  const _curNode = currentNode();
  if (_curNode) {
    const _nt = NODE_TYPES[_curNode.type] || {};
    const _nodeName = _curNode.name || _nt.name || '';
    const _reg = WORLD_CONFIG.regions.find(r => r.id === _curNode.regionId);
    const nodeInfoEl = document.getElementById('game-time');
    if (nodeInfoEl && nodeInfoEl.parentElement) {
      let locLabel = document.getElementById('node-location-label');
      if (!locLabel) {
        locLabel = document.createElement('div');
        locLabel.id = 'node-location-label';
        locLabel.style.cssText = 'font-size:9px;color:var(--text-dim);letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px';
        nodeInfoEl.parentElement.appendChild(locLabel);
      }
      locLabel.textContent = `${_reg ? _reg.name : ''} · ${_nodeName}`;
    }
  }

  // Actions
  const actionsEl = document.getElementById('actions');
  const loc = currentLocation();
  const isBase = G.world.homeBase === loc?.id;

  const node = currentNode();
  const inBuilding = !!(node && node.type === 'building' && node.building);
  const isLootableNode = node && node.type !== 'building' && NODE_TYPES[node.type]?.lootable;
  const canSearch = G.world.currentRoom >= 0 || (isLootableNode && !node.searched);
  const hasRoute = !!G.world.currentRoute;

  const actions = [
    { id:'search', uiIcon:'hud_search', label: isLootableNode ? 'Обыск' : 'Обыск', show: canSearch },
    { id:'move', uiIcon:'hud_rooms', label:'Комнаты', show: inBuilding },
    { id:'travel', uiIcon:'hud_travel', label: hasRoute ? 'Маршрут' : 'Идти', show: true },
    // Scout moved to Map menu
    { id:'stealth', uiIcon:'hud_stealth', label: G.player.stealthMode ? 'Скрыт.ON' : 'Скрыт.', show: true, cls: G.player.stealthMode ? 'stealth-on' : '' },
    { id:'rest', uiIcon:'hud_rest', label:'Отдых', show: G.world.currentRoom >= 0 },
    { id:'inventory', uiIcon:'hud_inventory', label:'Инвент.', show: true },
    { id:'health', uiIcon:'hud_health', label:'Здоровье', show: true },
    { id:'craft', uiIcon:'hud_craft', label:'Крафт', show: true },
    { id:'base', uiIcon:'hud_base', label: isBase ? 'База' : 'Уст.базу', show: (inBuilding && G.world.currentRoom >= 0) || isBase },
    { id:'map', uiIcon:'hud_map', label:'Карта', show: true },
    { id:'save', uiIcon:'hud_save', label:'Сохр.', show: true },
  ];

  actionsEl.innerHTML = '';
  actions.forEach(a => {
    if (!a.show) return;
    const btn = document.createElement('button');
    btn.className = `act-btn ${a.cls || ''}`;
    btn.innerHTML = `${uiIconHtml(a.uiIcon,22)}${a.label}`;
    btn.onclick = () => { ensureAudio(); doAction(a.id); };
    if (!G.player.alive) btn.disabled = true;
    actionsEl.appendChild(btn);
  });

  if (G.creative) {
    // Add creative panel button
    const cBtn = document.createElement('button');
    cBtn.className = 'act-btn';
    cBtn.style.borderColor = 'var(--cyan)';
    cBtn.style.color = 'var(--cyan)';
    cBtn.innerHTML = '☆ КРЕАТИВ';
    cBtn.onclick = () => showCreativePanel();
    actionsEl.appendChild(cBtn);
  }
  updateQuickSlots();
}

function addLog(text, cls = '') {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-entry ${cls}`;
  const ts = G ? `<span class="ts">${getTimeString()}</span>` : '';

  // Keep log manageable

// ── MODAL ──
function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-close').style.display = '';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  // Reset modal flex overrides (set by map)
  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modal-body');
  if (modal) { modal.style.display = ''; modal.style.flexDirection = ''; modal.style.overflow = ''; }
  if (modalBody) { modalBody.style.flex = ''; modalBody.style.overflow = ''; modalBody.style.padding = ''; }
  // Stop map animation loop
  if (mapState && mapState.animFrame) {
    cancelAnimationFrame(mapState.animFrame);
    mapState.animFrame = null;
  }
  // If player exited building (currentRoom === -1), put them back in entry room
  if (G && G.world.currentRoom === -1) {
    const loc = currentLocation();
    if (loc) {
      roomLayouts.clear();
      const layout = getLocationLayout(loc);
      if (layout) {
        const entryIdx = layout.rooms.findIndex(r => r.floorNum === 0);
        if (entryIdx >= 0) {
          G.world.currentRoom = entryIdx;
          const er = layout.rooms[entryIdx];
          sceneData.playerX = er.cx; sceneData.playerY = er.cy;
          sceneData.camX = er.cx; sceneData.camY = er.cy;
          sceneData.targetCamX = er.cx; sceneData.targetCamY = er.cy;
        }
      }
    }
  }
}

const DEFAULT_SETTINGS = { masterVol:80, sfxVol:100, musicVol:60, scanlines:true, particles:true, screenShake:true, showFps:false, logSize:100, logOpacity:85, logMode:'normal', soundVis:true, autoSave:true, brightness:100, uiScale:100, bloodEffects:true, nightFilter:true, tooltips:true, confirmDrop:true, autoLoot:false, combatPause:true, colorTheme:'green', invSort:'none', devMode:false };
let settings = { ...DEFAULT_SETTINGS };

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('echo7_settings'));
    if (s) settings = { ...DEFAULT_SETTINGS, ...s };
  } catch(e) {}
}

function saveSettings() {
  localStorage.setItem('echo7_settings', JSON.stringify(settings));
  applySettings();
}

function applySettings() {
  // Scanlines
  document.body.style.setProperty('--scanline-opacity', settings.scanlines ? '1' : '0');
  document.body.classList.toggle('no-scanlines', !settings.scanlines);
  // Volume
  if (audioCtx && audioCtx._masterGain) {
    audioCtx._masterGain.gain.value = settings.masterVol / 100;
  }
  // Log overlay
  const log = document.getElementById('log');
  if (log) {
    log.style.setProperty('--log-opacity', (settings.logOpacity || 85) / 100);
    const maxH = settings.logMode === 'compact' ? '80px' : settings.logMode === 'minimal' ? '50px' : '120px';
    log.style.setProperty('--log-max-h', maxH);
    log.className = settings.logMode === 'compact' ? 'log-compact' : settings.logMode === 'minimal' ? 'log-minimal' : '';
  }
}

// ═══════════════════════════════════════════
// MENU SYSTEM
// ═══════════════════════════════════════════
let menuBgCanvas, menuBgCtx, menuBgAnim;
let menuParticles = [];
let selectedDiff = 'normal';

function initMenuBackground() {
  menuBgCanvas = document.getElementById('menu-bg');
  if (!menuBgCanvas) return;
  menuBgCtx = menuBgCanvas.getContext('2d');
  resizeMenuBg();
  window.addEventListener('resize', resizeMenuBg);
  // Spawn initial particles
  for (let i = 0; i < 120; i++) {
    menuParticles.push(createMenuParticle(true));
  }
  // Rain streaks (CSS animated)
  const screen = document.getElementById('title-screen');
  for (let i = 0; i < 30; i++) {
    const streak = document.createElement('div');
    streak.className = 'rain-streak';
    streak.style.left = Math.random() * 100 + '%';
    streak.style.height = (40 + Math.random() * 80) + 'px';
    streak.style.animationDuration = (2 + Math.random() * 3) + 's';
    streak.style.animationDelay = Math.random() * 4 + 's';
    screen.insertBefore(streak, screen.firstChild);
  }
  menuBgLoop();
}

function resizeMenuBg() {
  if (!menuBgCanvas) return;
  menuBgCanvas.width = window.innerWidth * window.devicePixelRatio;
  menuBgCanvas.height = window.innerHeight * window.devicePixelRatio;
  menuBgCanvas.style.width = '100%';
  menuBgCanvas.style.height = '100%';
}

function createMenuParticle(scatter) {
  const w = window.innerWidth, h = window.innerHeight;
  return {
    x: scatter ? Math.random() * w : w/2 + (Math.random()-.5) * w * .3,
    y: scatter ? Math.random() * h : h/2 + (Math.random()-.5) * h * .3,
    vx: (Math.random() - .5) * .4,
    vy: (Math.random() - .5) * .4,
    size: .5 + Math.random() * 2,
    alpha: .05 + Math.random() * .2,
    color: Math.random() < .08 ? '#FF2244' : Math.random() < .2 ? '#00E5FF' : '#00FF41',
    life: 1,
    maxLife: 300 + Math.random() * 600,
    age: scatter ? Math.random() * 400 : 0,
  };
}

function menuBgLoop() {
  if (!menuBgCanvas || !menuBgCtx) return;
  const dpr = window.devicePixelRatio;
  const w = menuBgCanvas.width / dpr;
  const h = menuBgCanvas.height / dpr;

  menuBgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  menuBgCtx.fillStyle = 'rgba(0,0,0,.08)';
  menuBgCtx.fillRect(0, 0, w, h);

  // Subtle vignette
  const grad = menuBgCtx.createRadialGradient(w/2, h/2, w*.1, w/2, h/2, w*.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,.04)');
  menuBgCtx.fillStyle = grad;
  menuBgCtx.fillRect(0, 0, w, h);

  // Particles
  if (menuParticles.length < 120 && Math.random() < .3) {
    menuParticles.push(createMenuParticle(false));
  }

  for (let i = menuParticles.length - 1; i >= 0; i--) {
    const p = menuParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.age++;
    const lifeRatio = p.age / p.maxLife;
    const fade = lifeRatio < .1 ? lifeRatio * 10 : lifeRatio > .8 ? (1 - lifeRatio) * 5 : 1;

    if (p.age >= p.maxLife || p.x < -10 || p.x > w + 10 || p.y < -10 || p.y > h + 10) {
      menuParticles.splice(i, 1);
      continue;
    }

    menuBgCtx.globalAlpha = p.alpha * fade;
    menuBgCtx.fillStyle = p.color;

    // Slight flicker for red
    if (p.color === '#FF2244') {
      menuBgCtx.globalAlpha *= .5 + Math.sin(Date.now() * .008 + i) * .5;
    }

    menuBgCtx.fillRect(p.x, p.y, p.size, p.size);
  }

  // Horizontal scan line moving down
  menuBgCtx.globalAlpha = .03;
  menuBgCtx.fillStyle = '#00FF41';
  const scanY = (Date.now() * .03) % h;
  menuBgCtx.fillRect(0, scanY, w, 2);
  menuBgCtx.globalAlpha = 1;

  // Occasional glitch lines
  if (Math.random() < .005) {
    menuBgCtx.globalAlpha = .06 + Math.random() * .08;
    menuBgCtx.fillStyle = '#00FF41';
    const gy = Math.random() * h;
    menuBgCtx.fillRect(0, gy, w, 1 + Math.random() * 3);
    menuBgCtx.globalAlpha = 1;
  }

  menuBgAnim = requestAnimationFrame(menuBgLoop);
}

function stopMenuBg() {
  if (menuBgAnim) cancelAnimationFrame(menuBgAnim);
  menuBgAnim = null;
}

// ── Menu navigation ──
function menuShowPanel(id) {
  document.querySelectorAll('.menu-panel').forEach(p => p.classList.add('hidden'));
  const panel = document.getElementById(id);
  panel.classList.remove('hidden');

  // Re-trigger animations
  panel.querySelectorAll('.menu-btn, .scenario-btn, .menu-sep').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight; // force reflow
    el.style.animation = '';
  });

  // Panel-specific init
  if (id === 'panel-load') renderLoadSlots();
  if (id === 'panel-settings') renderSettings();
  if (id === 'panel-about') renderAbout();

  playSound('step');
}

function menuContinue() {
  if (loadGame()) {
    stopMenuBg();
  }
}

// ── Load slots ──
function renderLoadSlots() {
  const container = document.getElementById('load-slots');
  const saves = [];

  // Check all possible save slots
  for (let i = 0; i < 3; i++) {
    const key = i === 0 ? 'echo7_save' : `echo7_save_${i + 1}`;
    try {
      const data = JSON.parse(localStorage.getItem(key));
      saves.push({ slot: i, key, data });
    } catch(e) {
      saves.push({ slot: i, key, data: null });
    }
  }

  let html = '';
  saves.forEach((s, i) => {
    if (s.data) {
      const sc = SCENARIOS.find(x => x.id === s.data.scenario);
      const diff = s.data.difficulty;
      html += `<div class="save-slot" onclick="menuLoadSlot('${s.key}')">
        <div class="ss-title">СЛОТ ${i + 1} — ${sc ? sc.name : 'Выживший'}</div>
        <div class="ss-meta">
          День ${s.data.time?.day || '?'} · ${String(s.data.time?.hour || 0).padStart(2,'0')}:00<br>
          Сложность: ${diff?.name || '?'} · Убито: ${s.data.stats?.zombiesKilled || 0}
        </div>
        <div class="save-slot-actions">
          <button onclick="event.stopPropagation();menuLoadSlot('${s.key}')">Загрузить</button>
          <button class="del-btn" onclick="event.stopPropagation();menuDeleteSlot('${s.key}',${i})">Удалить</button>
        </div>
      </div>`;
    } else {
      html += `<div class="save-slot empty">
        <div class="ss-title">СЛОТ ${i + 1} — Пусто</div>
        <div class="ss-meta">Нет сохранения</div>
      </div>`;
    }
  });

  container.innerHTML = html;
}

function menuLoadSlot(key) {
  try {
    const data = JSON.parse(localStorage.getItem(key));
    if (!data || data.version !== 2) {
      openModal('', '<div style="text-align:center;color:var(--text)">Сохранение повреждено или несовместимо.</div>');
      return;
    }
    // Copy to main slot if needed
    if (key !== 'echo7_save') {
      localStorage.setItem('echo7_save', localStorage.getItem(key));
    }
    if (loadGame()) stopMenuBg();
  } catch(e) {
    openModal('', '<div style="text-align:center;color:var(--text)">Ошибка загрузки.</div>');
  }
}

function menuDeleteSlot(key, idx) {
  gameConfirm(`Удалить сохранение в слоте ${idx + 1}?`, () => {
    localStorage.removeItem(key);
    renderLoadSlots();
    checkContinueButton();
  });
}

function settingChange(key, val) {
  settings[key] = parseInt(val);
  const el = document.getElementById('sv-' + key);
  if (el) el.textContent = key === 'logSize' ? val : val + '%';
  saveSettings();
  if (key === 'uiScale') applyUiScale();
}

function settingToggle(key, el) {
  settings[key] = !settings[key];
  el.classList.toggle('on', settings[key]);
  saveSettings();
  if (key === 'devMode') updateDevButton();
}

function settingSet(key, val) {
  settings[key] = val;
  saveSettings();
  renderSettings();
}

function resetSettings() {
  gameConfirm('Сбросить все настройки?', () => {
    settings = { ...DEFAULT_SETTINGS };
    saveSettings();
    applyTheme(settings.colorTheme || 'green');
    renderSettings();
  });
}

function checkContinueButton() {
  const hasSave = !!localStorage.getItem('echo7_save');
  document.getElementById('btn-continue').style.display = hasSave ? '' : 'none';
  document.getElementById('sep-continue').style.display = hasSave ? '' : 'none';
  if (hasSave) {
    try {
      const data = JSON.parse(localStorage.getItem('echo7_save'));
      const sc = SCENARIOS.find(x => x.id === data.scenario);
      document.getElementById('continue-hint').textContent =
        `${sc ? sc.name : '?'} · День ${data.time?.day || '?'} · ${data.difficulty?.name || '?'}`;
    } catch(e) {
      document.getElementById('continue-hint').textContent = 'Загрузить последнее сохранение';
    }
  }
}

};

const BASE_TRAIT_POINTS = 0; // Start with 0, earn from negative traits or occupation bonus

function ccGetTotalPoints() {
  const occ = OCCUPATIONS.find(o => o.id === ccState.occupation);
  let pts = BASE_TRAIT_POINTS + (occ?.bonusPoints || 0);
  ccState.traits.forEach(tid => {
    const t = TRAITS.find(tr => tr.id === tid);
    if (t) pts -= t.cost; // positive cost reduces points, negative cost adds points
  });
  return pts;
}

function ccSetMode(mode, btnEl) {
  ccState.mode = mode;
  document.querySelectorAll('#mode-select .diff-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');

  const worldTab = document.getElementById('cc-tab-world');
  worldTab.textContent = mode === 'sandbox' ? 'Песочница' : mode === 'creative' ? 'Креатив' : 'Сложность';
  ccRenderWorldTab();
}

function ccShowTab(idx) {
  ccState.tab = idx;
  document.querySelectorAll('.cc-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.cc-panel').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });

  if (idx === 0) ccRenderPreview();
  if (idx === 1) ccRenderOccupations();
  if (idx === 2) ccRenderTraits();
  if (idx === 3) ccRenderWorldTab();
}

function ccRenderOccupations() {
  const container = document.getElementById('occ-list');
  container.innerHTML = OCCUPATIONS.map(occ => {
    const sel = ccState.occupation === occ.id;
    const skillTags = occ.skills ? Object.entries(occ.skills).filter(([,v]) => v !== 0).map(([k,v]) =>
      `<span class="occ-tag ${v > 0 ? 'positive' : 'negative'}">${v > 0 ? '+' : ''}${v} ${SKILL_NAMES[k]}</span>`
    ).join('') : '';
    const itemTags = (occ.items || []).slice(0, 4).map(id =>
      `<span class="occ-tag item">${ITEMS[id]?.name || id}</span>`
    ).join('') + (occ.items.length > 4 ? `<span class="occ-tag item">+${occ.items.length - 4}</span>` : '');
    const pointsInfo = occ.bonusPoints !== 0 ? `<span class="occ-tag ${occ.bonusPoints > 0 ? 'positive' : 'negative'}">${occ.bonusPoints > 0 ? '+' : ''}${occ.bonusPoints} очков черт</span>` : '';
    const profIcon = UI_MAP['prof_'+occ.id] ? uiIconHtml('prof_'+occ.id, 28) : '';
    return `<div class="occ-card ${sel ? 'selected' : ''}" onclick="ccSelectOcc('${occ.id}')">
      <div class="occ-name" style="display:flex;align-items:center;gap:6px">${profIcon}${occ.name}</div>
      <div class="occ-desc">${occ.desc}</div>
      <div class="occ-stats">${skillTags}${pointsInfo}${itemTags}</div>
    </div>`;
  }).join('');
}

function ccSelectOcc(id) {
  ccState.occupation = id;
  // Remove traits that would push points below 0
  let safetyLoop = 10;
  while (ccGetTotalPoints() < 0 && safetyLoop-- > 0) {
    // Remove the most expensive positive trait
    const posTraits = ccState.traits.filter(tid => { const t = TRAITS.find(tr => tr.id === tid); return t && t.cost > 0; });
    if (posTraits.length === 0) break;
    const mostExpensive = posTraits.sort((a, b) => {
      const ta = TRAITS.find(tr => tr.id === a);
      const tb = TRAITS.find(tr => tr.id === b);
      return tb.cost - ta.cost;
    })[0];
    ccState.traits = ccState.traits.filter(tid => tid !== mostExpensive);
  }
  ccRenderOccupations();
  ccUpdatePointsDisplay();
}

function ccRenderTraits() {
  const pts = ccGetTotalPoints();
  document.getElementById('pts-trait-val').textContent = pts;
  document.getElementById('pts-trait-val').className = `pts-val ${pts < 0 ? 'negative' : ''}`;

  const posTraits = TRAITS.filter(t => t.type === 'pos');
  const negTraits = TRAITS.filter(t => t.type === 'neg');

  document.getElementById('trait-list-pos').innerHTML =
    `<div class="trait-section-label">Положительные черты (стоят очки)</div>
    <div class="trait-list">${posTraits.map(t => ccRenderTraitCard(t, pts)).join('')}</div>`;

  document.getElementById('trait-list-neg').innerHTML =
    `<div class="trait-section-label">Отрицательные черты (дают очки)</div>
    <div class="trait-list">${negTraits.map(t => ccRenderTraitCard(t, pts)).join('')}</div>`;
}

function ccRenderTraitCard(t, pts) {
  const sel = ccState.traits.includes(t.id);
  const isExcluded = !sel && t.exclusive.some(ex => ccState.traits.includes(ex));
  const cantAfford = !sel && t.cost > 0 && pts < t.cost;
  const disabled = isExcluded || cantAfford;

  return `<div class="trait-card ${sel ? 'selected' : ''} ${t.type === 'neg' && sel ? 'neg' : ''} ${disabled ? 'disabled' : ''}"
    onclick="${disabled ? '' : `ccToggleTrait('${t.id}')`}">
    <div class="tc-cost ${t.cost > 0 ? 'pos' : 'neg'}">${t.cost > 0 ? '-' : '+'}${Math.abs(t.cost)}</div>
    <div class="tc-info">
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}${isExcluded ? ' [несовместимо]' : ''}</div>
    </div>
    <div class="tc-check">${sel ? '✓' : ''}</div>
  </div>`;
}

function ccToggleTrait(id) {
  if (ccState.traits.includes(id)) {
    ccState.traits = ccState.traits.filter(t => t !== id);
  } else {
    const trait = TRAITS.find(t => t.id === id);
    if (!trait) return;
    // Check exclusions
    if (trait.exclusive.some(ex => ccState.traits.includes(ex))) return;
    // Check affordability for positive traits
    if (trait.cost > 0 && ccGetTotalPoints() < trait.cost) return;
    ccState.traits.push(id);
  }
  ccRenderTraits();
  ccUpdatePointsDisplay();
}

function ccUpdatePointsDisplay() {
  const pts = ccGetTotalPoints();
  const el = document.getElementById('pts-trait-val');
  if (el) {
    el.textContent = pts;
    el.className = `pts-val ${pts < 0 ? 'negative' : ''}`;
  }
}

function ccRenderPreview() {
  const occ = OCCUPATIONS.find(o => o.id === ccState.occupation);
  const skills = { strength:0, stealth:0, scouting:0, firstAid:0, mechanics:0, cooking:0, lockpicking:0 };
  if (occ?.skills) Object.keys(occ.skills).forEach(k => skills[k] += occ.skills[k]);
  ccState.traits.forEach(tid => {
    const t = TRAITS.find(tr => tr.id === tid);
    if (t?.effect?.skills) Object.keys(t.effect.skills).forEach(k => skills[k] = Math.max(0, skills[k] + t.effect.skills[k]));
  });

  const statsHtml = `<div class="cc-preview">
    <div class="cc-preview-title">Навыки персонажа</div>
    ${Object.entries(skills).map(([k, v]) => {
      const boosted = v > 0;
      const bars = '█'.repeat(Math.min(v, 10)) + '░'.repeat(Math.max(0, 5 - v));
      return `<div class="cc-stat-row">
        <span class="stat-name">${SKILL_NAMES[k]}</span>
        <span class="stat-val ${boosted ? 'boosted' : ''}">${bars} ${v}</span>
      </div>`;
    }).join('')}
  </div>`;
  document.getElementById('cc-preview-stats').innerHTML = statsHtml;

  // Items preview
  const items = occ?.items || [];
  if (items.length > 0) {
    document.getElementById('cc-preview-items').innerHTML = `<div class="cc-preview">
      <div class="cc-preview-title">Стартовый инвентарь</div>
      ${items.map(id => `<div class="cc-stat-row"><span class="stat-name">${ITEMS[id]?.name || id}</span><span class="stat-val" style="color:var(--text-dim)">1</span></div>`).join('')}
    </div>`;
  } else {
    document.getElementById('cc-preview-items').innerHTML = `<div class="cc-preview">
      <div class="cc-preview-title">Стартовый инвентарь</div>
      <div style="color:var(--text-muted);font-size:11px;padding:4px 0">Пустой рюкзак</div>
    </div>`;
  }

  // Selected traits
  if (ccState.traits.length > 0) {
    const traitsPreview = ccState.traits.map(tid => {
      const t = TRAITS.find(tr => tr.id === tid);
      return `<span class="occ-tag ${t.type === 'pos' ? 'positive' : 'negative'}">${t.name}</span>`;
    }).join('');
    document.getElementById('cc-preview-items').innerHTML += `<div class="cc-preview" style="margin-top:8px">
      <div class="cc-preview-title">Черты</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">${traitsPreview}</div>
    </div>`;
  }
}

function difficultyDesc(d) {
  const parts = [];
  if (d.zombieSpeed === 'slow') parts.push('Медленные зомби');
  else if (d.zombieSpeed === 'fast') parts.push('Быстрые зомби');
  if (!d.permadeath) parts.push('Без перма-смерти');
  else parts.push('Перма-смерть');
  if (d.lootMult > 1) parts.push('Много лута');
  else if (d.lootMult < 1) parts.push('Мало лута');
  if (!d.infectionCure) parts.push('Заражение неизлечимо');
  return parts.join(' · ');
}

function sbOpt(...args) {
  const val = args.pop();
  return args.map(([v, label]) => `<option value="${v}" ${parseFloat(v) === parseFloat(val) ? 'selected' : ''}>${label}</option>`).join('');
}

function sbOptStr(...args) {
  const val = args.pop();
  return args.map(([v, label]) => `<option value="${v}" ${v === val ? 'selected' : ''}>${label}</option>`).join('');
}

function ccSelectDifficulty(id) {
  ccState.difficulty = id;
  ccRenderWorldTab();
}

function ccResetSandbox() {
  const base = DIFFICULTIES.find(d => d.id === 'normal');
  ccState.sandbox = { ...base, id:'sandbox', name:'Песочница', playerHp:1, playerSpeed:1, hungerRate:1, fatigueRate:1, skillRate:1, dayLength:1, weather:'normal', startSeason:'summer', lockedFreq:0.5 };
}

function ccSandbox(key, val) {
  if (!ccState.sandbox) ccResetSandbox();
  if (val === 'true') val = true;
  else if (val === 'false') val = false;
  else if (!isNaN(parseFloat(val))) val = parseFloat(val);
  ccState.sandbox[key] = val;
}

function ccStartGame() {
  const name = document.getElementById('cc-name').value.trim();
  if (ccGetTotalPoints() < 0) {
    openModal('', '<div style="text-align:center;color:var(--text)">Недостаточно очков для выбранных черт!</div>');
    return;
  }

  const charData = {
    name: name || 'Выживший',
    occupation: ccState.occupation,
    traits: [...ccState.traits],
    difficulty: ccState.difficulty,
    sandbox: ccState.mode === 'sandbox' ? ccState.sandbox : null,
    creative: ccState.mode === 'creative',
  };

  stopMenuBg();
  newGame(charData);
}

function gameConfirm(msg, onYes, onNo) {
  let html = `<div style="text-align:center;margin-bottom:14px;color:var(--text);font-size:12px;line-height:1.6">${msg}</div>`;
  html += '<div style="display:flex;gap:6px">';
  html += `<button class="act-btn" onclick="closeModal();(${onYes.toString()})()" style="flex:1">Да</button>`;
  html += `<button class="act-btn" onclick="closeModal();${onNo ? '('+onNo.toString()+')()' : ''}" style="flex:1;border-color:#661122;color:var(--red)">Нет</button>`;
  html += '</div>';
  openModal('', html);
}

function updateDevButton() {
  const btn = document.getElementById('btn-editor');
  if (btn) btn.style.display = settings.devMode ? '' : 'none';
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(function init() {
  loadSettings();
  applySettings();
  applyUiScale();
  applyTheme(settings.colorTheme || 'green');
  updateDevButton();

  // Adaptive viewport
  function fixViewportHeight() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', vh + 'px');
  }
  function applyDeviceLayout() {
    const w = window.innerWidth;
    const r = document.documentElement;
    if (w < 600) { r.style.setProperty('--btn-h','36px'); r.style.setProperty('--log-h','90px'); r.style.setProperty('--font-base','12px'); }
    else if (w < 1024) { r.style.setProperty('--btn-h','34px'); r.style.setProperty('--log-h','120px'); r.style.setProperty('--font-base','12px'); }
    else { r.style.setProperty('--btn-h','30px'); r.style.setProperty('--log-h','150px'); r.style.setProperty('--font-base','11px'); }
  }
  fixViewportHeight();
  applyDeviceLayout();
  window.addEventListener('resize', () => { fixViewportHeight(); applyDeviceLayout(); });

  // Landscape detection
  function checkLandscape() {
    const game = document.getElementById('game');
    if (!game) return;
    if (window.innerWidth > window.innerHeight && window.innerHeight < 500) {
      game.classList.add('landscape');
    } else {
      game.classList.remove('landscape');
    }
  }
  let landscapeTimer;
  window.addEventListener('resize', () => { clearTimeout(landscapeTimer); landscapeTimer = setTimeout(checkLandscape, 300); });
  checkLandscape();

  // Ripple effect on action buttons
  document.addEventListener('click', e => {
    const btn = e.target.closest('.act-btn');
    if (!btn) return;
    const r = document.createElement('span'); r.className='ripple';
    const rect = btn.getBoundingClientRect();
    const sz = Math.max(rect.width, rect.height);
    r.style.width=r.style.height=sz+'px';
    r.style.left=(e.clientX-rect.left-sz/2)+'px';
    r.style.top=(e.clientY-rect.top-sz/2)+'px';
    btn.appendChild(r);
    setTimeout(()=>r.remove(), 400);
  });

  // PWA: generate manifest as blob URL
  (function initPWA() {
    // Generate icons via canvas
    function makeIcon(sz) {
      const c = document.createElement('canvas'); c.width=c.height=sz;
      const x = c.getContext('2d');
      x.fillStyle='#000'; x.fillRect(0,0,sz,sz);
      x.fillStyle='#00ff41'; x.font=`bold ${sz*0.5}px monospace`; x.textAlign='center'; x.textBaseline='middle';
      x.fillText('E7',sz/2,sz/2);
      return c.toDataURL('image/png');
    }
    const manifest = {
      name:'ECHO-7',short_name:'ECHO-7',start_url:location.href,display:'standalone',
      background_color:'#000000',theme_color:'#000000',
      icons:[{src:makeIcon(192),sizes:'192x192',type:'image/png'},{src:makeIcon(512),sizes:'512x512',type:'image/png'}]
    };
    const blob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const link = document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);

    // Note: SW requires a real file, not blob URL. PWA install works via manifest only.
    // Install prompt
    window._deferredInstall = null;
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); window._deferredInstall = e; });
  })();

  // Generate favicon
  (function genFavicon() {
    const c = document.createElement('canvas'); c.width=c.height=32;
    const x = c.getContext('2d');
    x.fillStyle='#000'; x.fillRect(0,0,32,32);
    x.fillStyle='#00ff41'; x.font='bold 22px monospace'; x.textAlign='center'; x.textBaseline='middle';
    x.fillText('E',16,16);
    const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
    link.rel='icon'; link.href=c.toDataURL(); document.head.appendChild(link);
  })();

  // Continue button
  checkContinueButton();

  // Menu background
  initMenuBackground();

  // Init character creation tabs
  ccShowTab(0);

  // Touch events for audio unlock
  document.addEventListener('touchstart', ensureAudio, { once: true });
  document.addEventListener('click', ensureAudio, { once: true });

  // Keyboard: ESC for pause
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      // Close any context menu first
      document.querySelectorAll('.inv-ctx').forEach(el => el.remove());
      const overlay = document.getElementById('modal-overlay');
      if (overlay && overlay.classList.contains('active')) {
        closeModal();
        if (G) G.paused = false;
        return;
      }
      if (G && G.player && G.player.alive) {
        if (G.activeAction) { cancelTimedAction(); return; }
        G.paused = true;
        showPauseMenu();
      }
    }
  });

  // Pause on tab visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && G && G.player?.alive) G.paused = true;
  });
})();
</script>
</body>
