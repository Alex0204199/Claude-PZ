// LIDAR TOP-DOWN RENDERER v4
// ═══════════════════════════════════════════
let canvas, ctx, animId;

// Persistent scene geometry — scanned environments stay visible
const sceneData = {
  particles: [],       // Transient particles (pulse waves, ambient)
  persistentPoints: [], // Permanent scanned geometry points
  zombieEntities: [],  // Active zombie point-cloud representations
  scanWaves: [],       // Active radial scan waves
  soundPulses: [],     // Sound visualization rings from other rooms
  scannedRooms: new Set(), // Room IDs that have been scanned
  scannedOutdoor: false,   // Whether outdoor area was scanned
  playerGlow: 0,       // Player indicator pulse phase
  shakeAmount: 0,      // Screen shake intensity
  shakeDecay: 0.92,
  lastScanTime: 0,
  // Camera system
  camX: 0, camY: 0,
  targetCamX: 0, targetCamY: 0,
  // Player movement
  playerX: 0, playerY: 0,
  playerTargetX: 0, playerTargetY: 0,
  playerMoving: false,
  playerMoveCallback: null,
  playerGX: 0, playerGY: 0,
  playerDir: 2,
  currentRoomIdx: -1,
  ambientParticles: [],
  playerTrail: [],     // last 20 positions for walking trail
  // Hover state for clickable rooms
  hoverRoomIdx: -1,
  selectedFurnIdx: -1,
  // Drag-to-pan camera
  isDragging: false,
  wasDragging: false,
  dragStartX: 0, dragStartY: 0,
  dragCamStartX: 0, dragCamStartY: 0,
  cameraDragOffsetX: 0, cameraDragOffsetY: 0,
  dragReturnTimer: null,
  dragReturning: false,
  // Zoom
  zoom: 1.0,
  // CRT scanline
  scanLineY: 0,
  // Glitch
  glitchFrames: 0,
  glitchY: 0,
  glitchW: 0,
  glitchX: 0,
};

// Room layout generation — deterministic per location
const roomLayouts = new Map();

function initCanvas() {
  canvas = document.getElementById('pointcloud');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  requestAnimationFrame(() => { resizeCanvas(); roomLayouts.clear(); });
  window.addEventListener('resize', () => { resizeCanvas(); roomLayouts.clear(); });
  clearScene();

  // Click-to-move and hover
  canvas.addEventListener('click', handleCanvasClick);
  canvas.addEventListener('mousemove', handleCanvasHover);
  canvas.addEventListener('mouseleave', () => { sceneData.hoverRoomIdx = -1; sceneData.isDragging = false; canvas.style.cursor = 'default'; });

  // Drag-to-pan camera
  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    sceneData.isDragging = true;
    sceneData.wasDragging = false;
    sceneData.dragReturning = false;
    if (sceneData.dragReturnTimer) { clearTimeout(sceneData.dragReturnTimer); sceneData.dragReturnTimer = null; }
    sceneData.dragStartX = e.clientX;
    sceneData.dragStartY = e.clientY;
    sceneData.dragCamStartX = sceneData.cameraDragOffsetX;
    sceneData.dragCamStartY = sceneData.cameraDragOffsetY;
  });
  window.addEventListener('mousemove', (e) => {
    if (!sceneData.isDragging) return;
    const dx = sceneData.dragStartX - e.clientX;
    const dy = sceneData.dragStartY - e.clientY;
    sceneData.cameraDragOffsetX = sceneData.dragCamStartX + dx;
    sceneData.cameraDragOffsetY = sceneData.dragCamStartY + dy;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) sceneData.wasDragging = true;
  });
  window.addEventListener('mouseup', (e) => {
    if (e.button !== 0) return;
    if (sceneData.isDragging) {
      sceneData.isDragging = false;
      if (sceneData.wasDragging) {
        if (sceneData.dragReturnTimer) clearTimeout(sceneData.dragReturnTimer);
        sceneData.dragReturnTimer = setTimeout(() => {
          sceneData.dragReturning = true;
          sceneData.dragReturnTimer = null;
        }, 5000);
      } else {
        sceneData.cameraDragOffsetX = 0;
        sceneData.cameraDragOffsetY = 0;
      }
    }
  });

  // ── WASD keyboard movement ──
  const _keysHeld = new Set();
  document.addEventListener('keydown', (e) => {
    if (!G || !G.player?.alive) return;
    const modal = document.getElementById('modal-overlay');
    if (modal?.classList.contains('active')) return;
    const key = e.key.toLowerCase();
    if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(key)) {
      _keysHeld.add(key);
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', (e) => {
    _keysHeld.delete(e.key.toLowerCase());
  });

  // Process WASD in animLoop — store reference on sceneData
  sceneData._keysHeld = _keysHeld;

  animLoop();
}

function screenToWorld(sx, sy) {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas ? canvas.width / dpr : 500;
  const ch = canvas ? canvas.height / dpr : 400;
  const zm = sceneData.zoom || 1;
  const ux = (sx - cw / 2) / zm + cw / 2;
  const uy = (sy - ch / 2) / zm + ch / 2;
  return { x: ux + sceneData.camX - cw / 2, y: uy + sceneData.camY - ch / 2 };
}

function worldToScreen(wx, wy) {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas ? canvas.width / dpr : 500;
  const ch = canvas ? canvas.height / dpr : 400;
  const zm = sceneData.zoom || 1;
  const ux = wx - sceneData.camX + cw / 2;
  const uy = wy - sceneData.camY + ch / 2;
  return { x: (ux - cw / 2) * zm + cw / 2, y: (uy - ch / 2) * zm + ch / 2 };
}

function handleCanvasClick(e) {
  if (!G || sceneData.playerMoving) return;
  if (sceneData.wasDragging) { sceneData.wasDragging = false; return; }
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = screenToWorld(sx, sy);

  const loc = currentLocation();
  if (!loc) return;
  const layout = getLocationLayout(loc);
  if (!layout) return;

  const currentFloor = G.world.currentFloor || 0;

  // Check if clicked on furniture in current room
  if (G.world.currentRoom >= 0) {
    const curRoom = layout.rooms[G.world.currentRoom];
    if (curRoom && curRoom.furniture) {
      for (let fi = 0; fi < curRoom.furniture.length; fi++) {
        const f = curRoom.furniture[fi];
        const fw = (f.w || 4) / 2 + 2, fh = (f.h || 4) / 2 + 2;
        if (world.x >= f.x - fw && world.x <= f.x + fw &&
            world.y >= f.y - fh && world.y <= f.y + fh) {
          sceneData.selectedFurnIdx = fi;
          renderPointCloud('scan');
          searchContainer(fi);
          return;
        }
      }
    }
  }

  // Check if clicked on a room
  for (let i = 0; i < layout.rooms.length; i++) {
    const lr = layout.rooms[i];
    if (lr.floorNum !== currentFloor) continue;
    if (i === G.world.currentRoom) continue;
    const hw = lr.w / 2, hh = lr.h / 2;
    if (world.x >= lr.cx - hw - 5 && world.x <= lr.cx + hw + 5 &&
        world.y >= lr.cy - hh - 5 && world.y <= lr.cy + hh + 5) {
      const rKey = loc.id + '-' + i;
      if (sceneData.scannedRooms.has(rKey) || sceneData.scannedOutdoor) {
        movePlayerToRoom(i, layout, loc);
      }
      return;
    }
  }

  // Click on front door from inside — exit building to map
  if (G.world.currentRoom >= 0) {
    const fdDist = Math.hypot(world.x - layout.frontDoorX, world.y - layout.frontDoorY);
    if (fdDist < 15) {
      G.world.currentRoom = -1;
      showMap();
      return;
    }
  }

  // Click on building shell from outdoor — enter via front door
  if (G.world.currentRoom === -1) {
    const hw = layout.buildingW / 2, hh = layout.buildingH / 2;
    if (world.x >= layout.cx - hw && world.x <= layout.cx + hw &&
        world.y >= layout.cy - hh && world.y <= layout.cy + hh) {
      const entryIdx = layout.rooms.findIndex(r => r.floorNum === 0);
      if (entryIdx >= 0) movePlayerToRoom(entryIdx, layout, loc);
    }
  }
}

function handleCanvasHover(e) {
  if (!G) return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = screenToWorld(sx, sy);

  const loc = currentLocation();
  if (!loc) return;
  const layout = getLocationLayout(loc);
  if (!layout) return;

  const currentFloor = G.world.currentFloor || 0;
  let found = -1;

  for (let i = 0; i < layout.rooms.length; i++) {
    const lr = layout.rooms[i];
    if (lr.floorNum !== currentFloor) continue;
    if (i === G.world.currentRoom) continue;
    const hw = lr.w / 2, hh = lr.h / 2;
    if (world.x >= lr.cx - hw - 5 && world.x <= lr.cx + hw + 5 &&
        world.y >= lr.cy - hh - 5 && world.y <= lr.cy + hh + 5) {
      const rKey = loc.id + '-' + i;
      if (sceneData.scannedRooms.has(rKey) || sceneData.scannedOutdoor) {
        found = i;
        break;
      }
    }
  }

  sceneData.hoverRoomIdx = found;
  canvas.style.cursor = found >= 0 ? 'pointer' : 'default';
}

// ── BFS pathfinding between rooms via adjacency graph ──
function findRoomPath(fromIdx, toIdx, layout) {
  if (fromIdx === toIdx) return [fromIdx];
  const adj = layout.adjacency;
  if (!adj) return null;
  const visited = new Set([fromIdx]);
  const queue = [[fromIdx]];
  while (queue.length > 0) {
    const path = queue.shift();
    const last = path[path.length - 1];
    const neighbors = adj[last] || [];
    for (const n of neighbors) {
      if (visited.has(n)) continue;
      // Only traverse same floor
      const lr = layout.rooms.find(r => r.idx === n);
      if (!lr || lr.floorNum !== (G.world.currentFloor || 0)) continue;
      const newPath = [...path, n];
      if (n === toIdx) return newPath;
      visited.add(n);
      queue.push(newPath);
    }
  }
  return null; // no path
}

// ── Find shared door between two adjacent rooms ──
function findSharedDoor(roomA, roomB) {
  if (!roomA.sharedDoors) return null;
  for (const sd of roomA.sharedDoors) {
    if (sd.rooms.includes(roomA.idx) && sd.rooms.includes(roomB.idx)) return sd;
  }
  return null;
}

// ── Build waypoint list: player → door → room center → door → room center... ──
function getPathWaypoints(roomPath, layout) {
  const waypoints = [];
  for (let i = 0; i < roomPath.length - 1; i++) {
    const fromRoom = layout.rooms.find(r => r.idx === roomPath[i]);
    const toRoom = layout.rooms.find(r => r.idx === roomPath[i + 1]);
    if (!fromRoom || !toRoom) continue;
    const door = findSharedDoor(fromRoom, toRoom);
    if (door) {
      waypoints.push({ x: door.x, y: door.y, type: 'door', enterRoom: roomPath[i + 1] });
    }
    waypoints.push({ x: toRoom.cx, y: toRoom.cy, type: 'room', roomIdx: roomPath[i + 1] });
  }
  return waypoints;
}

// ── Animate player through a sequence of waypoints ──
function animateWaypointPath(waypoints, onComplete) {
  if (waypoints.length === 0) { if (onComplete) onComplete(); return; }
  const wp = waypoints.shift();
  animatePlayerMove(wp.x, wp.y, () => {
    if (wp.type === 'door' && wp.enterRoom !== undefined) {
      G.world.currentRoom = wp.enterRoom;
      playSound('step');
    }
    animateWaypointPath(waypoints, onComplete);
  });
}

function movePlayerToRoom(targetIdx, layout, loc) {
  const targetRoom = layout.rooms.find(r => r.idx === targetIdx);
  if (!targetRoom) return;

  const gameRoom = loc.rooms[targetIdx];
  // Stairs room — switch floor
  if (gameRoom && gameRoom.roomType === 'stairs') {
    // Path to stairs first, then switch floor
    const currentRoom = G.world.currentRoom;
    const roomPath = currentRoom >= 0 ? findRoomPath(currentRoom, targetIdx, layout) : null;
    const waypoints = roomPath ? getPathWaypoints(roomPath, layout) : [{ x: targetRoom.cx, y: targetRoom.cy, type: 'room' }];
    animateWaypointPath(waypoints, () => {
      const targetFloor = (G.world.currentFloor || 0) === 0 ? 1 : 0;
      G.world.currentFloor = targetFloor;
      transitionScene();
      const destIdx = layout.rooms.findIndex(r => r.floorNum === targetFloor);
      if (destIdx >= 0) {
        G.world.currentRoom = destIdx;
        const dr = layout.rooms[destIdx];
        sceneData.playerX = dr.cx; sceneData.playerY = dr.cy;
        sceneData.camX = dr.cx; sceneData.camY = dr.cy;
        sceneData.targetCamX = dr.cx; sceneData.targetCamY = dr.cy;
      }
      renderPointCloud('scan');
      addLog(`Вы ${targetFloor === 1 ? 'поднялись на 2-й этаж' : 'спустились на 1-й этаж'}`, 'info');
      updateUI(); playSound('step');
    });
    return;
  }

  // Normal room — pathfind through doors
  const currentRoom = G.world.currentRoom;
  const roomPath = currentRoom >= 0 ? findRoomPath(currentRoom, targetIdx, layout) : null;

  if (roomPath && roomPath.length > 1) {
    const waypoints = getPathWaypoints(roomPath, layout);
    animateWaypointPath(waypoints, () => {
      enterRoom(targetIdx);
    });
  } else {
    // Fallback: direct move (entering from outside or no path found)
    animatePlayerMove(targetRoom.cx, targetRoom.cy, () => {
      enterRoom(targetIdx);
    });
  }
  playSound('step');
}

function animatePlayerMove(tx, ty, callback) {
  sceneData.playerTargetX = tx;
  sceneData.playerTargetY = ty;
  sceneData.playerMoving = true;
  sceneData.playerMoveCallback = callback;
}

// ── Sound pulse emitter ──
function emitSoundPulse(roomIdx, intensity, color) {
  const loc = currentLocation();
  if (!loc) return;
  const layout = getLocationLayout(loc);
  if (!layout || !layout.rooms[roomIdx]) return;
  const lr = layout.rooms[roomIdx];
  sceneData.soundPulses.push({
    x: lr.cx, y: lr.cy,
    radius: 0,
    maxRadius: 20 + intensity * 15,
    life: 1.0,
    decay: 0.015,
    color: color || '#FFAA00',
  });
}

function clearScene() {

  sceneData.ambientParticles = [];

// ── Deterministic room layout generator (spatial, multi-floor) ──
function getLocationLayout(loc) {
  if (!loc) return null;
  if (roomLayouts.has(loc.id)) return roomLayouts.get(loc.id);

  const seed = hashStr(loc.id);
  const lrng = new RNG(seed);
  const tmpl = LOCATION_TEMPLATES[loc.type] || LOCATION_TEMPLATES.house;

  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;

  const buildingW = w * (tmpl.buildingRelW || 0.7);
  const buildingH = h * (tmpl.buildingRelH || 0.5);
  const cx = w / 2, cy = h / 2;

  const rooms = [];
  const adjacency = [];
  loc.rooms.forEach(() => adjacency.push([]));

  // Group game rooms by floor
  const floorGroups = {};
  loc.rooms.forEach((gameRoom, i) => {
    const fn = gameRoom.floorNum || 0;
    if (!floorGroups[fn]) floorGroups[fn] = [];
    floorGroups[fn].push({ gameRoom, idx: i });
  });

  // Grid subdivision — fills entire building area with no gaps
  Object.keys(floorGroups).forEach(floorNum => {
    const group = floorGroups[floorNum];
    const n = group.length;
    const bx = cx - buildingW / 2;
    const by = cy - buildingH / 2;

    // Calculate total weight for proportional sizing
    const totalWeight = group.reduce((s, g) => s + (g.gameRoom.weight || 1), 0);

    // Decide layout: rows x cols based on room count
    let cols, rows;
    if (n <= 2) { cols = n; rows = 1; }
    else if (n <= 4) { cols = 2; rows = Math.ceil(n / 2); }
    else { cols = 3; rows = Math.ceil(n / 3); }

    // Sort: corridors/stairs first (bottom), then big rooms, then closets last
    const sorted = [...group].sort((a, b) => {
      const aEntry = a.gameRoom.type === 'corridor' || a.gameRoom.type === 'stairs' ? 0 : 1;
      const bEntry = b.gameRoom.type === 'corridor' || b.gameRoom.type === 'stairs' ? 0 : 1;
      if (aEntry !== bEntry) return aEntry - bEntry;
      return (b.gameRoom.weight || 1) - (a.gameRoom.weight || 1);
    });

    // Separate: big rooms, corridor/stairs, closets
    const bigRooms = sorted.filter(it => it.gameRoom.type !== 'corridor' && it.gameRoom.type !== 'stairs' && it.gameRoom.type !== 'closet');
    const entries = sorted.filter(it => it.gameRoom.type === 'corridor' || it.gameRoom.type === 'stairs');
    const closets = sorted.filter(it => it.gameRoom.type === 'closet');

    // Build row assignments: big rooms fill upper rows, closets attach to rows with space
    const rowAssign = [];
    for (let r = 0; r < rows; r++) rowAssign.push([]);

    // Entries go to bottom row
    entries.forEach(it => rowAssign[rows - 1].push(it));

    // Big rooms fill rows from top
    bigRooms.forEach(item => {
      let minRow = 0, minCount = Infinity;
      for (let r = 0; r < rows; r++) {
        if (r === rows - 1 && entries.length > 0) continue; // skip entry row if it has corridor
        if (rowAssign[r].length < minCount) { minCount = rowAssign[r].length; minRow = r; }
      }
      rowAssign[minRow].push(item);
    });

    // Closets attach to the row with most large rooms (they'll be small strips)
    closets.forEach(item => {
      // Find row with highest total weight (closet will be small next to big rooms)
      let bestRow = 0, bestWeight = 0;
      for (let r = 0; r < rows; r++) {
        const rw = rowAssign[r].reduce((s,g) => s + (g.gameRoom.weight||1), 0);
        if (rw > bestWeight || (rw === bestWeight && rowAssign[r].length < rowAssign[bestRow].length)) {
          bestWeight = rw; bestRow = r;
        }
      }
      rowAssign[bestRow].push(item);
    });

    // Remove empty rows
    const activeRows = rowAssign.filter(r => r.length > 0);
    const actualRows = activeRows.length;
    const wallGap = 1.5; // thin wall between rooms

    // Row heights proportional to max weight in each row (realistic sizing)
    const rowWeights = activeRows.map(rowItems => {
      const maxW = Math.max(...rowItems.map(g => g.gameRoom.weight || 1));
      // Closets/small rooms get reduced height
      const hasOnlySmall = rowItems.every(g => g.gameRoom.type === 'closet' || (g.gameRoom.weight || 1) <= 1);
      return hasOnlySmall ? maxW * 0.5 : maxW;
    });
    const totalRowWeight = rowWeights.reduce((s,w) => s + w, 0);
    const rowHeights = rowWeights.map(w => (w / totalRowWeight) * buildingH);

    activeRows.forEach((rowItems, ri) => {
      const rowY = by + rowHeights.slice(0, ri).reduce((s,h) => s+h, 0);
      const rowH = rowHeights[ri];
      const rowWeight = rowItems.reduce((s, g) => s + (g.gameRoom.weight || 1), 0);
      let colX = bx;

      rowItems.forEach((item, ci) => {
        const { gameRoom, idx } = item;
        const wRatio = (gameRoom.weight || 1) / rowWeight;
        const roomW = buildingW * wRatio - wallGap;
        const roomH2 = rowH - wallGap;
        const rcx = colX + roomW / 2 + wallGap / 2;
        const rcy = rowY + roomH2 / 2 + wallGap / 2;
        colX += buildingW * wRatio;

        // Generate named furniture from ROOM_FURNITURE definitions
        // Realistic wall-hugging placement system
        const furnDefs = ROOM_FURNITURE[gameRoom.name] || [{name:'Ящик',icon:'□',shape:'box'}];
        const furniture = [];
        const margin = 3;
        const innerW = roomW - margin * 2;
        const innerH = roomH2 - margin * 2;
        // Track used linear space on each wall: 0=top, 1=right, 2=bottom, 3=left
        const wallUsed = [0, 0, 0, 0];
        const wallLen = [innerW, innerH, innerW, innerH];
        // Room edges
        const left = rcx - roomW / 2 + margin;
        const right = rcx + roomW / 2 - margin;
        const top2 = rcy - roomH2 / 2 + margin;
        const bottom2 = rcy + roomH2 / 2 - margin;

        furnDefs.forEach((fd, fi) => {
          let fx, fy, fw, fh;
          if (fd.shape === 'tall') {
            fw = Math.min(6, innerW * 0.15); fh = Math.min(14, innerH * 0.4);
            if (wallUsed[3] + fh + 1 <= wallLen[3]) {
              fx = left + fw / 2;
              fy = top2 + wallUsed[3] + fh / 2;
              wallUsed[3] += fh + 2;
            } else {
              fx = right - fw / 2;
              fy = top2 + wallUsed[1] + fh / 2;
              wallUsed[1] += fh + 2;
            }
          } else if (fd.shape === 'wide') {
            fw = Math.min(18, innerW * 0.45); fh = Math.min(6, innerH * 0.15);
            if (wallUsed[0] + fw + 1 <= wallLen[0]) {
              fx = left + wallUsed[0] + fw / 2;
              fy = top2 + fh / 2;
              wallUsed[0] += fw + 2;
            } else {
              fx = left + wallUsed[2] + fw / 2;
              fy = bottom2 - fh / 2;
              wallUsed[2] += fw + 2;
            }
          } else if (fd.shape === 'line') {
            fw = Math.min(14, innerW * 0.35); fh = Math.min(2, innerH * 0.06);
            if (wallUsed[0] + fw + 1 <= wallLen[0]) {
              fx = left + wallUsed[0] + fw / 2;
              fy = top2 + fh / 2;
              wallUsed[0] += fw + 2;
            } else if (wallUsed[2] + fw + 1 <= wallLen[2]) {
              fx = left + wallUsed[2] + fw / 2;
              fy = bottom2 - fh / 2;
              wallUsed[2] += fw + 2;
            } else {
              fx = right - fh / 2;
              fy = top2 + wallUsed[1] + fw / 2;
              wallUsed[1] += fw + 2;
              const tmp = fw; fw = fh; fh = tmp;
            }
          } else {
            fw = Math.min(6, innerW * 0.15); fh = Math.min(6, innerH * 0.15);
            if (wallUsed[2] + fw + 1 <= wallLen[2]) {
              fx = left + wallUsed[2] + fw / 2;
              fy = bottom2 - fh / 2;
              wallUsed[2] += fw + 2;
            } else if (wallUsed[0] + fw + 1 <= wallLen[0]) {
              fx = left + wallUsed[0] + fw / 2;
              fy = top2 + fh / 2;
              wallUsed[0] += fw + 2;
            } else if (wallUsed[1] + fh + 1 <= wallLen[1]) {
              fx = right - fw / 2;
              fy = top2 + wallUsed[1] + fh / 2;
              wallUsed[1] += fh + 2;
            } else {
              fx = rcx + (fi % 2 === 0 ? -1 : 1) * innerW * 0.2;
              fy = rcy;
            }
          }
          furniture.push({
            x: fx, y: fy, w: fw, h: fh,
            name: fd.name, icon: fd.icon, shape: fd.shape, furnIdx: fi,
            size: 2, type: 'box', angle: 0, length: fw,
          });
        });

        // Door position — bottom wall for first row's last item, or nearest to corridor
        let doorSide = ri === actualRows - 1 ? 2 : lrng.int(0, 3);
        let doorX, doorY;
        if (doorSide === 0) { doorX = rcx; doorY = rcy - roomH2/2; }
        else if (doorSide === 1) { doorX = rcx + roomW/2; doorY = rcy; }
        else if (doorSide === 2) { doorX = rcx; doorY = rcy + roomH2/2; }
        else { doorX = rcx - roomW/2; doorY = rcy; }

        rooms.push({
          idx, cx: rcx, cy: rcy, w: roomW, h: roomH2,
          furniture, doorX, doorY, doorSide,
          floorNum: parseInt(floorNum),
          roomType: gameRoom.roomType || 'room',
          name: gameRoom.name,
        });

        // Adjacency — adjacent rooms share a wall
        rooms.forEach(p => {
          if (p.idx === idx || p.floorNum !== parseInt(floorNum)) return;
          const touching = Math.abs(p.cx - rcx) < (p.w + roomW) / 2 + 5 &&
                           Math.abs(p.cy - rcy) < (p.h + roomH2) / 2 + 5;
          if (touching) {
            if (!adjacency[idx].includes(p.idx)) adjacency[idx].push(p.idx);
            if (!adjacency[p.idx].includes(idx)) adjacency[p.idx].push(idx);
          }
        });
      });
    });
  });

  rooms.sort((a, b) => a.idx - b.idx);

  // ── Create shared doorways between adjacent rooms ──
  for (let i = 0; i < rooms.length; i++) {
    const r1 = rooms[i];
    for (const j of adjacency[r1.idx]) {
      if (j <= r1.idx) continue;
      const r2 = rooms.find(r => r.idx === j);
      if (!r2 || r1.floorNum !== r2.floorNum) continue;

      const r1L = r1.cx - r1.w/2, r1R = r1.cx + r1.w/2;
      const r1T = r1.cy - r1.h/2, r1B = r1.cy + r1.h/2;
      const r2L = r2.cx - r2.w/2, r2R = r2.cx + r2.w/2;
      const r2T = r2.cy - r2.h/2, r2B = r2.cy + r2.h/2;

      let doorX, doorY, doorDir;

      if (Math.abs(r1B - r2T) < 4) {
        const overlapL = Math.max(r1L, r2L);
        const overlapR = Math.min(r1R, r2R);
        if (overlapR - overlapL > 12) {
          doorX = (overlapL + overlapR) / 2;
          doorY = (r1B + r2T) / 2;
          doorDir = 'h';
        }
      } else if (Math.abs(r2B - r1T) < 4) {
        const overlapL = Math.max(r1L, r2L);
        const overlapR = Math.min(r1R, r2R);
        if (overlapR - overlapL > 12) {
          doorX = (overlapL + overlapR) / 2;
          doorY = (r2B + r1T) / 2;
          doorDir = 'h';
        }
      } else if (Math.abs(r1R - r2L) < 4) {
        const overlapT = Math.max(r1T, r2T);
        const overlapB = Math.min(r1B, r2B);
        if (overlapB - overlapT > 12) {
          doorX = (r1R + r2L) / 2;
          doorY = (overlapT + overlapB) / 2;
          doorDir = 'v';
        }
      } else if (Math.abs(r2R - r1L) < 4) {
        const overlapT = Math.max(r1T, r2T);
        const overlapB = Math.min(r1B, r2B);
        if (overlapB - overlapT > 12) {
          doorX = (r2R + r1L) / 2;
          doorY = (overlapT + overlapB) / 2;
          doorDir = 'v';
        }
      }

      if (doorX !== undefined) {
        if (!r1.sharedDoors) r1.sharedDoors = [];
        if (!r2.sharedDoors) r2.sharedDoors = [];
        const door = { x: doorX, y: doorY, dir: doorDir, rooms: [r1.idx, r2.idx] };
        r1.sharedDoors.push(door);
        r2.sharedDoors.push(door);
      }
    }
  }

  // ── Determine exterior walls for each room ──
  for (const room of rooms) {
    room.exteriorWalls = [true, true, true, true]; // top, right, bottom, left
    const rL = room.cx - room.w/2, rR = room.cx + room.w/2;
    const rT = room.cy - room.h/2, rB = room.cy + room.h/2;
    for (const other of rooms) {
      if (other.idx === room.idx || other.floorNum !== room.floorNum) continue;
      const oL = other.cx - other.w/2, oR = other.cx + other.w/2;
      const oT = other.cy - other.h/2, oB = other.cx + other.h/2;
      // Check if other room covers this wall
      const hOverlap = Math.min(rR, oR) - Math.max(rL, oL) > 6;
      const oT2 = other.cy - other.h/2, oB2 = other.cy + other.h/2;
      const vOverlap = Math.min(rB, oB2) - Math.max(rT, oT2) > 6;
      if (Math.abs(rT - oB2) < 4 && hOverlap) room.exteriorWalls[0] = false; // top
      if (Math.abs(rR - oL) < 4 && vOverlap) room.exteriorWalls[1] = false;  // right
      if (Math.abs(rB - oT2) < 4 && hOverlap) room.exteriorWalls[2] = false; // bottom
      if (Math.abs(rL - oR) < 4 && vOverlap) room.exteriorWalls[3] = false;  // left
    }
  }

  const frontDoorX = cx;
  const frontDoorY = cy + buildingH / 2 + 8;

  const outdoorObjects = [];
  const outdoorCount = 8 + lrng.int(0, 12);
  for (let i = 0; i < outdoorCount; i++) {
    const angle = lrng.next() * Math.PI * 2;
    const dist = Math.max(buildingW, buildingH) * 0.55 + lrng.next() * Math.min(w, h) * 0.2;
    outdoorObjects.push({
      x: cx + Math.cos(angle) * dist, y: cy + Math.sin(angle) * dist,
      type: lrng.pick(['debris', 'tree', 'car', 'fence', 'rock']),
      size: 4 + lrng.next() * 12, angle: lrng.next() * Math.PI * 2,
      pointCount: 6 + lrng.int(0, 10),
    });
  }

  const layout = {
    cx, cy, buildingW, buildingH, rooms, outdoorObjects,
    adjacency, frontDoorX, frontDoorY,
    hasSecondFloor: loc.hasSecondFloor || false,
  };
  roomLayouts.set(loc.id, layout);
  return layout;
}

function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return Math.abs(h) || 1;
}

// ── Zombie entity management ──
function updateZombieEntities() {
  if (!G) return;
  const loc = currentLocation();
  if (!loc) return;
  const layout = getLocationLayout(loc);
  if (!layout) return;

  sceneData.zombieEntities = sceneData.zombieEntities.filter(z => {
    const gameRoom = loc.rooms[z.roomIdx];
    return gameRoom && gameRoom.zombies && gameRoom.zombies.currentHp > 0;
  });

  loc.rooms.forEach((room, i) => {
    if (!room.zombies || room.zombies.currentHp <= 0) return;
    const roomKey = loc.id + '-' + i;
    if (!sceneData.scannedRooms.has(roomKey) && !sceneData.scannedOutdoor) return;
    const existing = sceneData.zombieEntities.find(z => z.roomIdx === i);
    if (existing) return;
    const layoutRoom = layout.rooms[i];
    if (!layoutRoom) return;

    sceneData.zombieEntities.push({
      roomIdx: i,
      x: layoutRoom.cx + (Math.random() - 0.5) * layoutRoom.w * 0.5,
      y: layoutRoom.cy + (Math.random() - 0.5) * layoutRoom.h * 0.5,
      targetX: layoutRoom.cx,
      targetY: layoutRoom.cy,
      homeX: layoutRoom.cx,
      homeY: layoutRoom.cy,
      roomW: layoutRoom.w,
      roomH: layoutRoom.h,
      moveTimer: 0,
      moveInterval: 60 + Math.random() * 120,
      type: room.zombies.type,
      attacking: false,
      approaching: false,
      attackPhase: 0,
      pulsePhase: Math.random() * Math.PI * 2,
      pointCount: room.zombies.type === 'fat' ? 18 : room.zombies.type === 'soldier' ? 14 : 10,
      bodyPoints: [],
    });
  });
}

// ── LIDAR Scan trigger ──
function renderPointCloud(type) {
  if (!canvas || !G) return;
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  const period = getTimePeriod();
  const maxRadius = period === 'night' ? Math.min(w, h) * 0.25 :
                    period === 'dusk' || period === 'dawn' ? Math.min(w, h) * 0.38 :
                    Math.min(w, h) * 0.48;

  const node = currentNode();
  const isInBuilding = node && node.type === 'building' && node.building;
  const loc = isInBuilding ? node.building : null;
  const layout = loc ? getLocationLayout(loc) : null;

  const px = sceneData.playerX || (layout ? layout.cx : w / 2);
  const py = sceneData.playerY || (layout ? layout.cy : h / 2);

  // Scan wave
  const waveSpeed = type === 'pulse' ? 3.5 : 2.0;
  const waveDuration = type === 'pulse' ? 80 : 120;
  sceneData.scanWaves.push({
    x: px, y: py,
    radius: 0,
    maxRadius: maxRadius * 1.1,
    speed: waveSpeed,
    life: waveDuration,
    maxLife: waveDuration,
    color: type === 'pulse' ? '#00FF41' : '#00E5FF',
    type,
  });

  sceneData.lastScanTime = Date.now();

  // Transient scatter particles (200-400 green particles)
  const scatterCount = type === 'pulse' ? 200 : type === 'scan' ? 350 : 150;
  const maxP = 500;
  const toAdd = Math.min(scatterCount, maxP - sceneData.particles.length);
  for (let i = 0; i < toAdd; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * maxRadius;
    const speed = type === 'pulse' ? 2.5 + Math.random() * 3 : 1 + Math.random() * 2;
    let color;
    const r = Math.random();
    if (r < 0.08) color = '#00E5FF';
    else if (r < 0.2) color = '#1a1a1a';
    else color = '#00FF41';

    sceneData.particles.push({
      x: px, y: py,
      tx: px + Math.cos(angle) * dist,
      ty: py + Math.sin(angle) * dist,
      life: 1.0,
      decay: 0.006 + Math.random() * 0.012,
      size: 0.8 + Math.random() * 1.5,
      color, speed, progress: 0,
    });
  }

  // Persistent geometry scan
  if (layout) {
    const inRoom = G.world.currentRoom >= 0;
    const roomKey = inRoom ? loc.id + '-' + G.world.currentRoom : null;
    const currentFloor = G.world.currentFloor || 0;

    if (inRoom && roomKey && !sceneData.scannedRooms.has(roomKey)) {
      sceneData.scannedRooms.add(roomKey);
    }

    if (!sceneData.scannedOutdoor) {
      sceneData.scannedOutdoor = true;
      loc.rooms.forEach((room, ri) => {
        if ((room.floorNum || 0) !== currentFloor) return;
        const rKey = loc.id + '-' + ri;
        // Mark shells as visible
        if (!sceneData.scannedRooms.has(rKey)) {
          // Will be rendered directly by animLoop now
        }
      });
    }

    updateZombieEntities();
  } else if (!layout && !sceneData.scannedOutdoor) {
    sceneData.scannedOutdoor = true;
    const cx = w / 2, cy = h / 2;
    sceneData.playerX = cx;
    sceneData.playerY = cy;
    sceneData.camX = cx;
    sceneData.camY = cy;
    sceneData.targetCamX = cx;
    sceneData.targetCamY = cy;
  }

  if (type === 'pulse' && settings.screenShake) {
    sceneData.shakeAmount = 3;
  }
}

// ── Scene transition (new location) ──
function transitionScene() {
  sceneData.persistentPoints = [];
  sceneData.zombieEntities = [];
  sceneData.scanWaves = [];
  sceneData.scannedRooms.clear();
  sceneData.scannedOutdoor = false;
  sceneData.ambientParticles = [];
  sceneData.playerTrail = [];
  roomLayouts.clear();
  setTimeout(() => {
    const loc = currentLocation();
    if (loc) {
      const layout = getLocationLayout(loc);
      if (layout) {
        sceneData.playerX = layout.frontDoorX;
        sceneData.playerY = layout.frontDoorY;
        sceneData.camX = layout.frontDoorX;
        sceneData.camY = layout.frontDoorY;
        sceneData.targetCamX = layout.frontDoorX;
        sceneData.targetCamY = layout.frontDoorY;
        layout.rooms.forEach((r, i) => sceneData.scannedRooms.add(loc.id + '-' + i));
      }
    }
    renderPointCloud('scan');
  }, 100);
}

// ── Zombie attack animation ──
function triggerZombieAttackAnimation(roomIdx) {
  const entity = sceneData.zombieEntities.find(z => z.roomIdx === roomIdx);
  if (entity) {
    entity.attacking = true;
    entity.attackPhase = 0;
    entity.targetX = sceneData.playerX;
    entity.targetY = sceneData.playerY;
    if (settings.screenShake) sceneData.shakeAmount = 6;
  }
}

// ── Helper: draw wall segments with gaps for doorways ──
function drawWallWithGaps(ctx, x1, y1, x2, y2, gapPositions, gapSize, isHorizontal) {
  if (gapPositions.length === 0) {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    return;
  }
  const halfGap = gapSize / 2;
  gapPositions.sort((a, b) => a - b);

  if (isHorizontal) {
    const startX = Math.min(x1, x2), endX = Math.max(x1, x2);
    let curX = startX;
    for (const gx of gapPositions) {
      if (gx - halfGap > curX) {
        ctx.beginPath(); ctx.moveTo(curX, y1); ctx.lineTo(gx - halfGap, y1); ctx.stroke();
      }
      // Door edge markers
      const prevAlpha = ctx.globalAlpha;
      ctx.fillStyle = '#00E5FF'; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(gx - halfGap, y1, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(gx + halfGap, y1, 1.2, 0, Math.PI * 2); ctx.fill();
      // Animated door indicator
      ctx.strokeStyle = '#00E5FF';
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.004) * 0.15;
      ctx.setLineDash([2, 3]);
      ctx.beginPath();
      ctx.moveTo(gx - halfGap, y1);
      ctx.lineTo(gx + halfGap, y1);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = prevAlpha;
      curX = gx + halfGap;
    }
    if (curX < endX) {
      ctx.beginPath(); ctx.moveTo(curX, y1); ctx.lineTo(endX, y1); ctx.stroke();
    }
  } else {
    const startY = Math.min(y1, y2), endY = Math.max(y1, y2);
    let curY = startY;
    for (const gy of gapPositions) {
      if (gy - halfGap > curY) {
        ctx.beginPath(); ctx.moveTo(x1, curY); ctx.lineTo(x1, gy - halfGap); ctx.stroke();
      }
      const prevAlpha = ctx.globalAlpha;
      ctx.fillStyle = '#00E5FF'; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(x1, gy - halfGap, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x1, gy + halfGap, 1.2, 0, Math.PI * 2); ctx.fill();
      // Animated door indicator
      ctx.strokeStyle = '#00E5FF';
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.004) * 0.15;
      ctx.setLineDash([2, 3]);
      ctx.beginPath();
      ctx.moveTo(x1, gy - halfGap);
      ctx.lineTo(x1, gy + halfGap);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = prevAlpha;
      curY = gy + halfGap;
    }
    if (curY < endY) {
      ctx.beginPath(); ctx.moveTo(x1, curY); ctx.lineTo(x1, endY); ctx.stroke();
    }
  }
}

// ═══════════════════════════════════════════
// TOP-DOWN LIDAR ANIMATION LOOP v4
// ═══════════════════════════════════════════

function animLoop() {
  if (!canvas || !ctx) { animId = requestAnimationFrame(animLoop); return; }
  const dpr = window.devicePixelRatio;
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  const now = Date.now();

  // Real-time clock tick
  if (G && G.player.alive) tickRealTime(now);

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // ── WASD free movement within current room (only when inside a room) ──
  if (sceneData._keysHeld && sceneData._keysHeld.size > 0 && !sceneData.playerMoving && G?.player?.alive && G.world.currentRoom >= 0) {
    const keys = sceneData._keysHeld;
    let mdx = 0, mdy = 0;
    if (keys.has('w') || keys.has('arrowup')) mdy -= 1;
    if (keys.has('s') || keys.has('arrowdown')) mdy += 1;
    if (keys.has('a') || keys.has('arrowleft')) mdx -= 1;
    if (keys.has('d') || keys.has('arrowright')) mdx += 1;
    if (mdx !== 0 || mdy !== 0) {
      const len = Math.hypot(mdx, mdy);
      const stealthSpd = G.player.stealthMode ? 0.4 : 0.8;
      const stepX = (mdx / len) * stealthSpd;
      const stepY = (mdy / len) * stealthSpd;
      const nx = sceneData.playerX + stepX;
      const ny = sceneData.playerY + stepY;
      // Update facing direction
      if (Math.abs(mdx) > Math.abs(mdy)) sceneData.playerDir = mdx > 0 ? 1 : 3;
      else sceneData.playerDir = mdy > 0 ? 2 : 0;
      // Collision: stay within current room bounds
      const loc = currentLocation();
      const layout = loc ? getLocationLayout(loc) : null;
      const curRoom = layout && G.world.currentRoom >= 0 ? layout.rooms.find(r => r.idx === G.world.currentRoom) : null;
      let canMove = true;
      if (curRoom) {
        const margin = 4;
        const rl = curRoom.cx - curRoom.w/2 + margin, rr = curRoom.cx + curRoom.w/2 - margin;
        const rt = curRoom.cy - curRoom.h/2 + margin, rb = curRoom.cy + curRoom.h/2 - margin;
        if (nx < rl || nx > rr || ny < rt || ny > rb) {
          canMove = false;
          // Check if walking through a shared door → transition to next room
          if (curRoom.sharedDoors) {
            for (const sd of curRoom.sharedDoors) {
              const ddist = Math.hypot(nx - sd.x, ny - sd.y);
              if (ddist < 10) {
                const otherIdx = sd.rooms.find(r => r !== curRoom.idx);
                if (otherIdx !== undefined) {
                  G.world.currentRoom = otherIdx;
                  canMove = true;
                  playSound('step');
                  const gameRoom = loc.rooms[otherIdx];
                  if (gameRoom && !gameRoom.searched) {
                    addLog(`Входишь в: ${gameRoom.name}`, 'info');
                  }
                  break;
                }
              }
            }
          }
          // Check exterior door → exit building and open world map
          if (!canMove && curRoom.doorSide !== undefined) {
            const ddist = Math.hypot(nx - curRoom.doorX, ny - curRoom.doorY);
            if (ddist < 10) {
              // Exit building — open world map
              G.world.currentRoom = -1;
              showMap();
              canMove = false;
            }
          }
        }
        // Furniture collision
        if (canMove && curRoom.furniture) {
          for (const f of curRoom.furniture) {
            const fw = (f.w||4)/2 + 1, fh = (f.h||4)/2 + 1;
            if (nx > f.x - fw && nx < f.x + fw && ny > f.y - fh && ny < f.y + fh) {
              canMove = false;
              break;
            }
          }
        }
      }
      if (canMove) {
        sceneData.playerX = nx;
        sceneData.playerY = ny;
        // Walking trail
        if (!sceneData.playerTrail) sceneData.playerTrail = [];
        if (now - (sceneData._lastTrailTime||0) > 100) {
          sceneData.playerTrail.push({x: nx, y: ny, t: now});
          if (sceneData.playerTrail.length > 20) sceneData.playerTrail.shift();
          sceneData._lastTrailTime = now;
        }
      }
    }
  }

  // ── Player movement animation (click-to-move / pathfinding) ──
  if (sceneData.playerMoving) {
    const dx = sceneData.playerTargetX - sceneData.playerX;
    const dy = sceneData.playerTargetY - sceneData.playerY;
    const dist = Math.hypot(dx, dy);
    const stealthMult = G?.player?.stealthMode ? 0.4 : 1.0;
    const moveSpeed = Math.max(0.5, dist * 0.035) * stealthMult;
    if (dist < 2) {
      sceneData.playerX = sceneData.playerTargetX;
      sceneData.playerY = sceneData.playerTargetY;
      sceneData.playerMoving = false;
      if (sceneData.playerMoveCallback) {
        sceneData.playerMoveCallback();
        sceneData.playerMoveCallback = null;
      }
    } else {
      sceneData.playerX += (dx / dist) * moveSpeed;
      sceneData.playerY += (dy / dist) * moveSpeed;
      if (Math.abs(dx) > Math.abs(dy)) {
        sceneData.playerDir = dx > 0 ? 1 : 3;
      } else {
        sceneData.playerDir = dy > 0 ? 2 : 0;
      }
    }
  }

  // ── Player trail ──
  if (sceneData.playerMoving) {
    const trail = sceneData.playerTrail;
    if (trail.length === 0 || Math.hypot(sceneData.playerX - trail[trail.length - 1].x, sceneData.playerY - trail[trail.length - 1].y) > 3) {
      trail.push({ x: sceneData.playerX, y: sceneData.playerY, t: now });
      if (trail.length > 20) trail.shift();
    }
  }

  // ── Camera smooth follow ──
  sceneData.targetCamX = sceneData.playerX;
  sceneData.targetCamY = sceneData.playerY;
  if (sceneData.dragReturning) {
    sceneData.cameraDragOffsetX *= 0.9;
    sceneData.cameraDragOffsetY *= 0.9;
    if (Math.abs(sceneData.cameraDragOffsetX) < 0.5 && Math.abs(sceneData.cameraDragOffsetY) < 0.5) {
      sceneData.cameraDragOffsetX = 0;
      sceneData.cameraDragOffsetY = 0;
      sceneData.dragReturning = false;
    }
  }
  const camTargetX = sceneData.targetCamX + sceneData.cameraDragOffsetX;
  const camTargetY = sceneData.targetCamY + sceneData.cameraDragOffsetY;
  const camLerp = sceneData.isDragging ? 0.15 : 0.08;
  sceneData.camX += (camTargetX - sceneData.camX) * camLerp;
  sceneData.camY += (camTargetY - sceneData.camY) * camLerp;

  // ── Background — solid dark fill ──
  ctx.fillStyle = '#040804';
  ctx.fillRect(0, 0, w, h);

  // Apply zoom
  const zm = sceneData.zoom;
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.scale(zm, zm);
  ctx.translate(-w / 2, -h / 2);

  // Player screen position
  const screenPX = sceneData.playerX - sceneData.camX + w / 2;
  const screenPY = sceneData.playerY - sceneData.camY + h / 2;

  // Screen shake
  if (sceneData.shakeAmount > 0.1) {
    const shx = (Math.random() - 0.5) * sceneData.shakeAmount;
    const shy = (Math.random() - 0.5) * sceneData.shakeAmount;
    ctx.translate(shx, shy);
    sceneData.shakeAmount *= sceneData.shakeDecay;
  } else {
    sceneData.shakeAmount = 0;
  }

  // ══════════════════════════════════════
  // TOP-DOWN ROOM RENDERING
  // ══════════════════════════════════════
  if (G) {
    const loc = currentLocation();
    const layout = loc ? getLocationLayout(loc) : null;

    if (layout) {
      const currentFloor = G.world.currentFloor || 0;
      const currentRoomIdx = G.world.currentRoom;

      for (let ri = 0; ri < layout.rooms.length; ri++) {
        const lr = layout.rooms[ri];
        if (lr.floorNum !== currentFloor) continue;

        const rKey = loc.id + '-' + ri;
        const isScanned = sceneData.scannedRooms.has(rKey) || sceneData.scannedOutdoor;
        const isCurrent = ri === currentRoomIdx;
        const isHover = ri === sceneData.hoverRoomIdx;
        const gameRoom = loc.rooms[ri];
        const hasZ = gameRoom && gameRoom.zombies && gameRoom.zombies.currentHp > 0;
        const isSearched = gameRoom && gameRoom.searched;
        const isStairs = lr.roomType === 'stairs';
        const isCorridor = lr.roomType === 'corridor';

        // Room rect in screen coords
        const rx = lr.cx - lr.w / 2 - sceneData.camX + w / 2;
        const ry = lr.cy - lr.h / 2 - sceneData.camY + h / 2;
        const rw = lr.w;
        const rh = lr.h;

        // Cull off-screen rooms
        if (rx + rw < -20 || rx > w + 20 || ry + rh < -20 || ry > h + 20) continue;

        // ── Floor grid ──
        const gridAlpha = isCurrent ? 0.08 : isScanned ? 0.03 : 0.015;
        ctx.save();
        ctx.beginPath();
        ctx.rect(rx, ry, rw, rh);
        ctx.clip();

        // Floor fill — different tint per room type
        let floorColor;
        if (isCurrent) {
          if (isStairs) floorColor = 'rgba(255,224,0,0.06)';
          else if (isCorridor) floorColor = 'rgba(0,229,255,0.05)';
          else floorColor = 'rgba(0,229,255,0.08)';
        } else if (isScanned) {
          if (hasZ) floorColor = 'rgba(255,34,68,0.03)';
          else if (isStairs) floorColor = 'rgba(255,224,0,0.03)';
          else floorColor = 'rgba(0,255,65,0.04)';
        } else {
          floorColor = 'rgba(0,255,65,0.015)';
        }
        ctx.fillStyle = floorColor;
        ctx.fillRect(rx, ry, rw, rh);

        // Dotted grid pattern
        ctx.strokeStyle = isCurrent ? 'rgba(0,229,255,0.12)' : 'rgba(0,255,65,0.05)';
        ctx.lineWidth = 0.5;
        ctx.setLineDash([1, 4]);
        const gridStep = 15;
        for (let gx = rx - ((rx % gridStep) + gridStep) % gridStep; gx < rx + rw; gx += gridStep) {
          ctx.beginPath();
          ctx.moveTo(gx, ry);
          ctx.lineTo(gx, ry + rh);
          ctx.stroke();
        }
        for (let gy = ry - ((ry % gridStep) + gridStep) % gridStep; gy < ry + rh; gy += gridStep) {
          ctx.beginPath();
          ctx.moveTo(rx, gy);
          ctx.lineTo(rx + rw, gy);
          ctx.stroke();
        }
        ctx.setLineDash([]);
        ctx.restore();

        // Hover highlight
        if (isHover) {
          ctx.fillStyle = `rgba(0,255,65,${0.04 + Math.sin(now * 0.005) * 0.02})`;
          ctx.fillRect(rx, ry, rw, rh);
        }

        // ── Wall color selection ──
        let wallColor;
        if (isCurrent) wallColor = '#00E5FF';
        else if (isStairs) wallColor = '#FFE000';
        else if (isCorridor) wallColor = '#007766';
        else if (hasZ) wallColor = '#4a1520';
        else if (isSearched) wallColor = '#00a82b';
        else if (isScanned) wallColor = '#00FF41';
        else wallColor = '#0d2a0d';

        const wallAlpha = isCurrent ? 0.95 : isScanned ? 0.7 : 0.35;
        const wallWidth = isCurrent ? 4 : isScanned ? 3 : 2;

        // ── Walls with glow — thick bright lines ──
        ctx.save();
        ctx.globalAlpha = wallAlpha;
        ctx.strokeStyle = wallColor;
        ctx.lineWidth = wallWidth;
        if (isCurrent || (isScanned && !hasZ)) {
          ctx.shadowColor = wallColor;
          ctx.shadowBlur = 8;
        }

        // Draw 4 wall segments with gaps at all shared doorways
        const doorGap = 14;
        const sides = [
          { x1: rx, y1: ry, x2: rx + rw, y2: ry },             // top (0)
          { x1: rx + rw, y1: ry, x2: rx + rw, y2: ry + rh },   // right (1)
          { x1: rx + rw, y1: ry + rh, x2: rx, y2: ry + rh },   // bottom (2)
          { x1: rx, y1: ry + rh, x2: rx, y2: ry },              // left (3)
        ];

        for (let si = 0; si < 4; si++) {
          const side = sides[si];
          const isHoriz = (si === 0 || si === 2);
          const gaps = [];

          // Original room door
          if (lr.doorSide === si) {
            if (isHoriz) {
              gaps.push((side.x1 + side.x2) / 2);
            } else {
              gaps.push((side.y1 + side.y2) / 2);
            }
          }

          // Shared doors on this wall
          if (lr.sharedDoors) {
            for (const sd of lr.sharedDoors) {
              const sdScreenX = sd.x - sceneData.camX + w / 2;
              const sdScreenY = sd.y - sceneData.camY + h / 2;
              if (isHoriz && sd.dir === 'h') {
                const wallY = (si === 0) ? ry : ry + rh;
                if (Math.abs(wallY - sdScreenY) < 3) {
                  gaps.push(sdScreenX);
                }
              } else if (!isHoriz && sd.dir === 'v') {
                const wallX = (si === 1) ? rx + rw : rx;
                if (Math.abs(wallX - sdScreenX) < 3) {
                  gaps.push(sdScreenY);
                }
              }
            }
          }

          drawWallWithGaps(ctx, side.x1, side.y1, side.x2, side.y2, gaps, doorGap, isHoriz);

          // ── Exterior wall double-line effect ──
          if (lr.exteriorWalls && lr.exteriorWalls[si]) {
            ctx.save();
            ctx.globalAlpha = wallAlpha * 0.3;
            ctx.lineWidth = wallWidth + 2;
            drawWallWithGaps(ctx, side.x1, side.y1, side.x2, side.y2, gaps, doorGap, isHoriz);
            ctx.restore();
            // Restore wall style
            ctx.globalAlpha = wallAlpha;
            ctx.strokeStyle = wallColor;
            ctx.lineWidth = wallWidth;
            if (isCurrent || (isScanned && !hasZ)) {
              ctx.shadowColor = wallColor;
              ctx.shadowBlur = 8;
            }
          }

          // ── Windows on exterior walls ──
          if (lr.exteriorWalls && lr.exteriorWalls[si] && (isScanned || isCurrent)) {
            const wallLen = isHoriz ? Math.abs(side.x2 - side.x1) : Math.abs(side.y2 - side.y1);
            const numWindows = Math.floor(wallLen / 25);
            if (numWindows > 0) {
              ctx.save();
              ctx.strokeStyle = 'rgba(0,229,255,0.15)';
              ctx.lineWidth = 0.5;
              ctx.shadowBlur = 0;
              for (let wi = 0; wi < numWindows; wi++) {
                const t = (wi + 1) / (numWindows + 1);
                const wx = side.x1 + (side.x2 - side.x1) * t;
                const wy = side.y1 + (side.y2 - side.y1) * t;
                const wSize = 4;
                if (isHoriz) {
                  ctx.strokeRect(wx - wSize / 2, wy - 1.5, wSize, 3);
                } else {
                  ctx.strokeRect(wx - 1.5, wy - wSize / 2, 3, wSize);
                }
              }
              ctx.restore();
              // Restore wall style after window drawing
              ctx.globalAlpha = wallAlpha;
              ctx.strokeStyle = wallColor;
              ctx.lineWidth = wallWidth;
              if (isCurrent || (isScanned && !hasZ)) {
                ctx.shadowColor = wallColor;
                ctx.shadowBlur = 8;
              }
            }
          }
        }

        ctx.shadowBlur = 0;
        ctx.restore();

        // ── Furniture ──
        if (isCurrent || isSearched) {
          for (let fi = 0; fi < lr.furniture.length; fi++) {
            const furn = lr.furniture[fi];
            const fsx = furn.x - sceneData.camX + w / 2;
            const fsy = furn.y - sceneData.camY + h / 2;

            if (fsx < -30 || fsx > w + 30 || fsy < -30 || fsy > h + 30) continue;

            const isSelected = sceneData.selectedFurnIdx === fi && isCurrent;
            const distToPlayer = Math.hypot(furn.x - sceneData.playerX, furn.y - sceneData.playerY);
            const isNearby = distToPlayer < 30;

            const fw = (furn.w || 4) / 2;
            const fh = (furn.h || 4) / 2;

            // Furniture fill
            let furnFill, furnBorder;
            if (isSelected) {
              furnFill = 'rgba(0,229,255,0.25)';
              furnBorder = '#00E5FF';
            } else if (isNearby) {
              furnFill = 'rgba(0,255,65,0.15)';
              furnBorder = '#00FF41';
            } else if (isSearched) {
              furnFill = 'rgba(0,255,65,0.06)';
              furnBorder = '#004d12';
            } else {
              furnFill = 'rgba(0,255,65,0.1)';
              furnBorder = '#00a82b';
            }

            // Draw furniture based on shape type
            ctx.fillStyle = furnFill;
            ctx.strokeStyle = furnBorder;
            ctx.lineWidth = isSelected ? 1.5 : 0.8;
            ctx.globalAlpha = isSelected ? 0.9 : isNearby ? 0.7 : 0.5;

            if (isSelected) { ctx.shadowColor = '#00E5FF'; ctx.shadowBlur = 6; }

            if (furn.shape === 'tall') {
              // Wardrobe — filled rect with shelf lines
              ctx.fillRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.strokeRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.globalAlpha *= 0.4;
              const shelfCount = Math.max(2, Math.floor(fh*2 / 5));
              for (let sl=1; sl<shelfCount; sl++) {
                const sly = fsy - fh + sl * (fh*2/shelfCount);
                ctx.beginPath(); ctx.moveTo(fsx-fw+1, sly); ctx.lineTo(fsx+fw-1, sly); ctx.stroke();
              }
            } else if (furn.shape === 'wide') {
              // Table/bed — filled rect with center cross
              ctx.fillRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.strokeRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.globalAlpha *= 0.3;
              ctx.beginPath(); ctx.moveTo(fsx, fsy-fh+1); ctx.lineTo(fsx, fsy+fh-1); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(fsx-fw+1, fsy); ctx.lineTo(fsx+fw-1, fsy); ctx.stroke();
            } else if (furn.shape === 'line') {
              // Shelf — thin line with tick marks
              ctx.fillRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.strokeRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.globalAlpha *= 0.4;
              const ticks = Math.max(2, Math.floor(fw*2 / 4));
              for (let ti=1; ti<ticks; ti++) {
                const tx = fsx - fw + ti * (fw*2/ticks);
                ctx.beginPath(); ctx.moveTo(tx, fsy-fh); ctx.lineTo(tx, fsy+fh); ctx.stroke();
              }
            } else {
              // Box — small container with X mark
              ctx.fillRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.strokeRect(fsx-fw, fsy-fh, fw*2, fh*2);
              ctx.globalAlpha *= 0.4;
              ctx.beginPath(); ctx.moveTo(fsx-fw+1, fsy-fh+1); ctx.lineTo(fsx+fw-1, fsy+fh-1); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(fsx+fw-1, fsy-fh+1); ctx.lineTo(fsx-fw+1, fsy+fh-1); ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            // Name label when nearby
            if (isNearby && furn.name) {
              ctx.globalAlpha = isSelected ? 0.9 : 0.65;
              ctx.fillStyle = isSelected ? '#00E5FF' : '#00FF41';
              ctx.font = '7px "Courier New", monospace';
              ctx.textAlign = 'center';
              ctx.fillText(furn.name, fsx, fsy - fh - 4);
              ctx.globalAlpha = 1;
            }
          }
        }

        // ── Stairs indicator ──
        if (isStairs && (isScanned || isCurrent)) {
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = '#FFE000';
          ctx.lineWidth = 1;
          const rcx = lr.cx - sceneData.camX + w / 2;
          const rcy = lr.cy - sceneData.camY + h / 2;
          for (let k = 0; k < 5; k++) {
            const t = k / 5;
            const sy1 = rcy - rh * 0.3 + t * rh * 0.15;
            ctx.beginPath();
            ctx.moveTo(rcx - rw * 0.2, sy1);
            ctx.lineTo(rcx + rw * 0.2, sy1);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

        // ── Room name label ──
        if (isScanned || isCurrent) {
          const rcx = lr.cx - sceneData.camX + w / 2;
          const rcy = lr.cy - sceneData.camY + h / 2;
          ctx.font = '8px "Courier New", monospace';
          ctx.textAlign = 'center';
          ctx.globalAlpha = isCurrent ? 0.7 : isHover ? 0.8 : 0.35;
          ctx.fillStyle = isCurrent ? '#00E5FF' : isHover ? '#00FF41' : wallColor;
          ctx.fillText(lr.name || '', rcx, rcy - rh * 0.3);
          ctx.globalAlpha = 1;
        }
      }

      // ── Building outer envelope ──
      if (layout) {
        const bx = layout.cx - layout.buildingW / 2 - sceneData.camX + w / 2;
        const by2 = layout.cy - layout.buildingH / 2 - sceneData.camY + h / 2;
        const bw2 = layout.buildingW;
        const bh2 = layout.buildingH;
        ctx.save();
        ctx.strokeStyle = '#00FF41';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.3;
        ctx.shadowColor = '#00FF41';
        ctx.shadowBlur = 4;
        ctx.strokeRect(bx, by2, bw2, bh2);
        ctx.restore();
      }

      // ── Floor indicator for multi-floor ──
      if (layout.hasSecondFloor) {
        const floorLabel = (G.world.currentFloor || 0) === 0 ? '1F' : '2F';
        const flx = layout.cx + layout.buildingW / 2 - 10 - sceneData.camX + w / 2;
        const fly = layout.cy - layout.buildingH / 2 + 8 - sceneData.camY + h / 2;
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#FFE000';
        ctx.font = '9px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(floorLabel, flx, fly);
        ctx.globalAlpha = 1;
      }

      // ── Front door marker ──
      if (sceneData.scannedOutdoor) {
        const fdx = layout.frontDoorX - sceneData.camX + w / 2;
        const fdy = layout.frontDoorY - sceneData.camY + h / 2;
        ctx.globalAlpha = 0.6 + Math.sin(now * 0.003) * 0.2;
        ctx.fillStyle = '#00E5FF';
        ctx.beginPath();
        ctx.arc(fdx, fdy, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (sceneData.scannedOutdoor) {
      // ── Outdoor node rendering (roads, landmarks) ──
      const node = currentNode();
      const nt = node ? NODE_TYPES[node.type] : null;
      const cx = w / 2, cy = h / 2;

      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = '#1a3a1a';
      ctx.lineWidth = 1.2;

      if (node && (node.type === 'road' || node.type === 'intersection' || node.type === 'alley')) {
        const roadW = node.type === 'alley' ? 30 : 50;
        const heading = G.world.lastHeading || { dx: 1, dy: 0 };
        const isVert = Math.abs(heading.dy) > Math.abs(heading.dx);

        if (node.type === 'intersection') {
          // Horizontal road edges
          ctx.beginPath();
          ctx.moveTo(cx - 120, cy - roadW / 2); ctx.lineTo(cx + 120, cy - roadW / 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx - 120, cy + roadW / 2); ctx.lineTo(cx + 120, cy + roadW / 2);
          ctx.stroke();
          // Vertical road edges
          ctx.beginPath();
          ctx.moveTo(cx - roadW / 2, cy - 120); ctx.lineTo(cx - roadW / 2, cy + 120);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx + roadW / 2, cy - 120); ctx.lineTo(cx + roadW / 2, cy + 120);
          ctx.stroke();
          // Center dashes
          ctx.strokeStyle = '#333300';
          ctx.globalAlpha = 0.15;
          ctx.setLineDash([4, 8]);
          ctx.beginPath(); ctx.moveTo(cx - 100, cy); ctx.lineTo(cx + 100, cy); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx, cy - 100); ctx.lineTo(cx, cy + 100); ctx.stroke();
          ctx.setLineDash([]);
        } else if (isVert) {
          ctx.beginPath(); ctx.moveTo(cx - roadW / 2, cy - 120); ctx.lineTo(cx - roadW / 2, cy + 120); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx + roadW / 2, cy - 120); ctx.lineTo(cx + roadW / 2, cy + 120); ctx.stroke();
          ctx.strokeStyle = '#333300'; ctx.globalAlpha = 0.15; ctx.setLineDash([4, 8]);
          ctx.beginPath(); ctx.moveTo(cx, cy - 100); ctx.lineTo(cx, cy + 100); ctx.stroke();
          ctx.setLineDash([]);
        } else {
          ctx.beginPath(); ctx.moveTo(cx - 120, cy - roadW / 2); ctx.lineTo(cx + 120, cy - roadW / 2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx - 120, cy + roadW / 2); ctx.lineTo(cx + 120, cy + roadW / 2); ctx.stroke();
          ctx.strokeStyle = '#333300'; ctx.globalAlpha = 0.15; ctx.setLineDash([4, 8]);
          ctx.beginPath(); ctx.moveTo(cx - 100, cy); ctx.lineTo(cx + 100, cy); ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      // Car wreck
      if (node && node.type === 'car_wreck') {
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = '#661122';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(cx, cy - 20, 40, 20);
      }

      // Parking
      if (node && node.type === 'parking') {
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = '#1a2a1a';
        ctx.lineWidth = 1;
        for (let c = 0; c < 4; c++) {
          ctx.strokeRect(cx - 70 + c * 40, cy - 15 + (c % 2) * 35, 30, 15);
        }
      }

      // Bus stop
      if (node && node.type === 'bus_stop') {
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = '#1a2a3a';
        ctx.lineWidth = 1.3;
        ctx.strokeRect(cx + 15, cy - 25, 30, 25);
      }

      // Forest
      if (node && (node.type === 'forest_trail' || node.type === 'forest_clearing')) {
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#0a2a0a';
        for (let t = 0; t < 12; t++) {
          const tx = cx + (Math.sin(t * 1.7) * 80);
          const ty = cy + (Math.cos(t * 2.3) * 80);
          ctx.beginPath();
          ctx.arc(tx, ty, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Gas station
      if (node && node.type === 'gas_station') {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#3a3a1a';
        ctx.lineWidth = 1.3;
        ctx.strokeRect(cx - 40, cy - 30, 80, 40);
        ctx.fillStyle = '#3a3a1a';
        for (let p2 = 0; p2 < 3; p2++) {
          ctx.fillRect(cx - 25 + p2 * 25 - 2, cy - 12, 4, 4);
        }
      }

      // Location label
      if (node) {
        const nodeName = node.name || (nt && nt.name) || '';
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#00E5FF';
        ctx.font = '9px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(nodeName, cx, cy - 60);
      }

      ctx.globalAlpha = 1;
    }
  }

  // ══════════════════════════════════════
  // ZOMBIE ENTITIES (top-down red circles)
  // ══════════════════════════════════════
  const pWorldX = sceneData.playerX;
  const pWorldY = sceneData.playerY;
  for (let i = 0; i < sceneData.zombieEntities.length; i++) {
    const z = sceneData.zombieEntities[i];
    z.pulsePhase += 0.05;
    z.moveTimer++;

    if (z.approaching) {
      const dx = pWorldX - z.x;
      const dy = pWorldY - z.y;
      const dist = Math.hypot(dx, dy);
      const approachSpeed = z.type === 'runner' ? 0.8 : 0.4;
      if (dist < 15) {
        z.approaching = false;
        z.arrivedCombat = true;
        if (settings.screenShake) sceneData.shakeAmount = 6;
        const loc = currentLocation();
        if (loc && loc.rooms[z.roomIdx] && loc.rooms[z.roomIdx].zombies) {
          const gameZombie = loc.rooms[z.roomIdx].zombies;
          addLog(`${gameZombie.name} пришёл на шум и нападает!`, 'danger');
          playSound('alert');
          startCombat(gameZombie, loc.rooms[z.roomIdx]);
        }
      } else {
        z.x += (dx / dist) * approachSpeed;
        z.y += (dy / dist) * approachSpeed;
      }
    } else if (z.attacking) {
      z.attackPhase += 0.03;
      z.targetX = pWorldX;
      z.targetY = pWorldY;
      const t = Math.min(1, z.attackPhase);
      const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      z.x = z.x + (z.targetX - z.x) * eased * 0.08;
      z.y = z.y + (z.targetY - z.y) * eased * 0.08;

      const distToPlayer = Math.hypot(z.x - pWorldX, z.y - pWorldY);
      if (distToPlayer < 40 && settings.screenShake) {
        sceneData.shakeAmount = Math.max(sceneData.shakeAmount, 2 + (1 - distToPlayer / 40) * 5);
      }

      if (z.attackPhase > 1.5) {
        z.attacking = false;
        z.x = z.homeX + (Math.random() - 0.5) * z.roomW * 0.3;
        z.y = z.homeY + (Math.random() - 0.5) * z.roomH * 0.3;
      }
    } else {
      if (z.moveTimer > z.moveInterval) {
        z.moveTimer = 0;
        z.moveInterval = 80 + Math.random() * 160;
        z.targetX = z.homeX + (Math.random() - 0.5) * z.roomW * 0.5;
        z.targetY = z.homeY + (Math.random() - 0.5) * z.roomH * 0.5;
      }
      z.x += (z.targetX - z.x) * 0.01;
      z.y += (z.targetY - z.y) * 0.01;

      if (settings.soundVis && z.moveTimer % 120 === 0 && G && G.world.currentRoom !== z.roomIdx) {
        emitSoundPulse(z.roomIdx, 1, '#FF4444');
      }
    }

    // Zombie noise attraction
    if (!z.attacking && !z.approaching && !z.arrivedCombat && G && G.world.currentRoom !== z.roomIdx) {
      const noise = G.player.moodles.noise || 0;
      const zombieHearing = G.difficulty.zombieHearing || 1;
      const distToPlayer = Math.hypot(z.x - pWorldX, z.y - pWorldY);
      if (noise > 30 && distToPlayer < 200) {
        if (Math.random() < 0.001 * noise * zombieHearing) {
          z.approaching = true;
          addLog(`Шум привлёк зомби из другой комнаты!`, 'warning');
          if (settings.soundVis) emitSoundPulse(z.roomIdx, 3, '#FF2244');
        }
      }
    }

    // Draw zombie — red circle core + scattered dots
    const zsx = z.x - sceneData.camX + w / 2;
    const zsy = z.y - sceneData.camY + h / 2;
    if (zsx < -30 || zsx > w + 30 || zsy < -30 || zsy > h + 30) continue;

    const zombiePulse = Math.sin(z.pulsePhase);
    const distToPlayer = Math.hypot(z.x - pWorldX, z.y - pWorldY);
    const pulseFreq = z.attacking || z.approaching ? 0.15 : 0.03 + Math.max(0, 1 - distToPlayer / 150) * 0.08;
    z.pulsePhase += pulseFreq;

    const zombieAlpha = z.attacking || z.approaching ?
      0.6 + Math.sin(z.pulsePhase * 3) * 0.4 :
      0.3 + zombiePulse * 0.2 + Math.max(0, 1 - distToPlayer / 100) * 0.3;

    const bodyRadius = z.type === 'fat' ? 5 : z.type === 'soldier' ? 4 : 3;
    const attackScale = z.attacking ? 1 + z.attackPhase * 0.8 : 1;

    // Pulsating red glow when approaching
    if ((z.approaching || z.attacking) && distToPlayer < 120) {
      const glowR = bodyRadius * 4 * attackScale;
      const glowAlpha = (1 - distToPlayer / 120) * 0.15 * (0.6 + zombiePulse * 0.4);
      const zGrad = ctx.createRadialGradient(zsx, zsy, 0, zsx, zsy, glowR);
      zGrad.addColorStop(0, `rgba(255,34,68,${glowAlpha})`);
      zGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = zGrad;
      ctx.fillRect(zsx - glowR, zsy - glowR, glowR * 2, glowR * 2);
    }

    // Zombie ambient glow (simple circle, no gradient for perf)
    const ambientGlowR = bodyRadius * 4 * attackScale;
    ctx.globalAlpha = (0.04 + (1 - Math.min(1, distToPlayer/150)) * 0.06) * (0.7 + zombiePulse*0.3);
    ctx.fillStyle = '#FF2244';
    ctx.beginPath(); ctx.arc(zsx, zsy, ambientGlowR, 0, Math.PI*2); ctx.fill();

    // Red body core with shadow glow
    ctx.save();
    ctx.globalAlpha = zombieAlpha;
    ctx.fillStyle = '#FF2244';
    ctx.shadowColor = '#FF2244'; ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(zsx, zsy, bodyRadius * attackScale, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Bright eye dot
    ctx.fillStyle = '#FF6688';
    ctx.globalAlpha = zombieAlpha * 0.8;
    ctx.beginPath(); ctx.arc(zsx + 1, zsy - 1, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Scattered noise cloud (12-16 points, orbiting)
    const scatterPts = Math.min(z.pointCount + 4, 16);
    for (let p = 0; p < scatterPts; p++) {
      const angle = (p / scatterPts) * Math.PI * 2 + now * 0.001 + z.pulsePhase * 0.3;
      const dist2 = bodyRadius * (0.8 + Math.sin(angle*2 + now*0.003) * 0.6) * attackScale;
      const zpx = zsx + Math.cos(angle) * dist2;
      const zpy = zsy + Math.sin(angle) * dist2;
      const dotSz = 0.8 + Math.random() * 1.2;
      ctx.globalAlpha = zombieAlpha * (0.3 + Math.random() * 0.5);
      ctx.fillStyle = '#FF2244';
      ctx.fillRect(zpx - dotSz/2, zpy - dotSz/2, dotSz, dotSz);
    }

    // Red aura when close
    if (distToPlayer < 80 && !z.attacking && !z.approaching) {
      const haloAlpha = (1 - distToPlayer / 80) * 0.12 * (0.6 + zombiePulse * 0.4);
      const haloGrad = ctx.createRadialGradient(zsx, zsy, 0, zsx, zsy, bodyRadius * 4);
      haloGrad.addColorStop(0, `rgba(255,34,68,${haloAlpha})`);
      haloGrad.addColorStop(1, 'transparent');
      ctx.globalAlpha = 1;
      ctx.fillStyle = haloGrad;
      ctx.beginPath(); ctx.arc(zsx, zsy, bodyRadius*4, 0, Math.PI*2); ctx.fill();
    }

    // Attack/approach particles
    if ((z.attacking || z.approaching) && Math.random() < 0.4 && sceneData.particles.length < 500) {
      sceneData.particles.push({
        x: z.x + (Math.random() - 0.5) * 4, y: z.y + (Math.random() - 0.5) * 4,
        tx: z.x + (Math.random() - 0.5) * 8, ty: z.y + (Math.random() - 0.5) * 8,
        life: 0.4 + Math.random() * 0.3, decay: 0.02, size: 1, color: '#FF2244',
        speed: 0, progress: 1,
      });
    }
  }
  ctx.globalAlpha = 1;

  // ══════════════════════════════════════
  // SCAN WAVES (expanding circles)
  // ══════════════════════════════════════
  for (let i = sceneData.scanWaves.length - 1; i >= 0; i--) {
    const sw = sceneData.scanWaves[i];
    sw.radius += sw.speed;
    sw.life--;

    if (sw.life <= 0 || sw.radius > sw.maxRadius) {
      sceneData.scanWaves.splice(i, 1);
      continue;
    }

    const lifeRatio = sw.life / sw.maxLife;
    const alpha = lifeRatio * 0.4;
    const swSX = sw.x - sceneData.camX + w / 2;
    const swSY = sw.y - sceneData.camY + h / 2;

    // Expanding ring
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = sw.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(swSX, swSY, sw.radius, 0, Math.PI * 2);
    ctx.stroke();

    // Inner glow ring
    ctx.globalAlpha = alpha * 0.25;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(swSX, swSY, Math.max(0, sw.radius - 2), 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ══════════════════════════════════════
  // SOUND PULSES (expanding circles)
  // ══════════════════════════════════════
  if (settings.soundVis) {
    for (let i = sceneData.soundPulses.length - 1; i >= 0; i--) {
      const sp = sceneData.soundPulses[i];
      sp.radius += 1.2;
      sp.life -= sp.decay;
      if (sp.life <= 0 || sp.radius > sp.maxRadius) {
        sceneData.soundPulses.splice(i, 1);
        continue;
      }
      const spx = sp.x - sceneData.camX + w / 2;
      const spy = sp.y - sceneData.camY + h / 2;
      ctx.beginPath();
      ctx.arc(spx, spy, sp.radius, 0, Math.PI * 2);
      ctx.strokeStyle = sp.color;
      ctx.globalAlpha = sp.life * 0.3;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ══════════════════════════════════════
  // FOG OF WAR / VISIBILITY
  // ══════════════════════════════════════
  if (G) {
    const period = getTimePeriod();
    const hasTorch = hasItem('torch');
    const torchBonus = hasTorch ? 20 : 0;

    let visRadius;
    if (period === 'night') visRadius = 80 + torchBonus;
    else if (period === 'dusk' || period === 'dawn') visRadius = 140 + torchBonus * 0.5;
    else visRadius = 180;

    // Darkening gradient from player
    const darkStrength = period === 'night' ? 0.65 : period === 'dusk' || period === 'dawn' ? 0.45 : 0.25;
    const vGrad = ctx.createRadialGradient(screenPX, screenPY, visRadius * 0.4, screenPX, screenPY, visRadius * 1.8);
    vGrad.addColorStop(0, 'transparent');
    vGrad.addColorStop(0.6, `rgba(4,8,4,${darkStrength * 0.3})`);
    vGrad.addColorStop(1, `rgba(4,8,4,${darkStrength})`);
    ctx.fillStyle = vGrad;
    ctx.fillRect(-50, -50, w + 100, h + 100);

    // Torch warm glow at night
    if (hasTorch && (period === 'night' || period === 'dusk')) {
      const tGrad = ctx.createRadialGradient(screenPX, screenPY, 0, screenPX, screenPY, visRadius * 0.8);
      tGrad.addColorStop(0, 'rgba(255,160,40,0.04)');
      tGrad.addColorStop(0.5, 'rgba(255,100,20,0.015)');
      tGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = tGrad;
      ctx.fillRect(-50, -50, w + 100, h + 100);
    }
  }

  // ══════════════════════════════════════
  // PLAYER (top-down circle + ring + glow)
  // ══════════════════════════════════════
  sceneData.playerGlow = (sceneData.playerGlow + 0.03) % (Math.PI * 2);
  const glowIntensity = 0.3 + Math.sin(sceneData.playerGlow) * 0.15;

  // Walking trail — fading dots
  const trail = sceneData.playerTrail;
  for (let ti = 0; ti < trail.length; ti++) {
    const tp = trail[ti];
    const age = (now - tp.t) / 2000;
    if (age > 1) continue;
    const tsx = tp.x - sceneData.camX + w / 2;
    const tsy = tp.y - sceneData.camY + h / 2;
    ctx.globalAlpha = (1 - age) * 0.25;
    ctx.fillStyle = '#00FF41';
    ctx.beginPath();
    ctx.arc(tsx, tsy, 1 + (1 - age), 0, Math.PI * 2);
    ctx.fill();
  }

  // Large radial glow (visibility cone)
  ctx.save();
  const glowR = 40;
  const pGrad = ctx.createRadialGradient(screenPX, screenPY, 0, screenPX, screenPY, glowR);
  pGrad.addColorStop(0, `rgba(0,255,65,${glowIntensity * 0.2})`);
  pGrad.addColorStop(0.5, `rgba(0,255,65,${glowIntensity * 0.06})`);
  pGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = pGrad;
  ctx.beginPath(); ctx.arc(screenPX, screenPY, glowR, 0, Math.PI*2); ctx.fill();

  // Outer pulsating ring (10px)
  ctx.globalAlpha = 0.3 + Math.sin(sceneData.playerGlow) * 0.15;
  ctx.strokeStyle = '#00FF41';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(screenPX, screenPY, 10, 0, Math.PI*2); ctx.stroke();

  // Second outer ring (16px, dimmer)
  ctx.globalAlpha = 0.12 + Math.sin(sceneData.playerGlow * 0.7) * 0.06;
  ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.arc(screenPX, screenPY, 16, 0, Math.PI*2); ctx.stroke();

  // Core body (5px bright green)
  ctx.globalAlpha = 0.95;
  ctx.fillStyle = '#00FF41';
  ctx.shadowColor = '#00FF41'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(screenPX, screenPY, 5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Direction arrow
  const dirMap = [
    { dx: 0, dy: -1 },  // 0 = up (N)
    { dx: 1, dy: 0 },   // 1 = right (E)
    { dx: 0, dy: 1 },   // 2 = down (S)
    { dx: -1, dy: 0 },  // 3 = left (W)
  ];
  const dir = dirMap[sceneData.playerDir] || dirMap[2];
  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = '#00FF41';
  ctx.lineWidth = 2;
  const tipX = screenPX + dir.dx * 16, tipY = screenPY + dir.dy * 16;
  ctx.beginPath();
  ctx.moveTo(screenPX + dir.dx * 7, screenPY + dir.dy * 7);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  // Arrow head
  const perpX = -dir.dy * 4, perpY = dir.dx * 4;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - dir.dx*5 + perpX, tipY - dir.dy*5 + perpY);
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - dir.dx*5 - perpX, tipY - dir.dy*5 - perpY);
  ctx.stroke();
  ctx.restore();

  // ══════════════════════════════════════
  // AMBIENT PARTICLES (floating green dots)
  // ══════════════════════════════════════
  while (sceneData.ambientParticles.length < 40) {
    sceneData.ambientParticles.push({
      x: sceneData.camX + (Math.random() - 0.5) * w * 1.5,
      y: sceneData.camY + (Math.random() - 0.5) * h * 1.5,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -0.1 - Math.random() * 0.2,
      alpha: 0.2 + Math.random() * 0.3,
      size: 0.8 + Math.random() * 1.2,
      life: 1,
      decay: 0.002 + Math.random() * 0.003,
      color: Math.random() < 0.3 ? '#00FF41' : '#003d0f',
    });
  }

  for (let i = sceneData.ambientParticles.length - 1; i >= 0; i--) {
    const ap = sceneData.ambientParticles[i];
    ap.x += ap.vx;
    ap.y += ap.vy;
    ap.life -= ap.decay;
    if (ap.life <= 0) { sceneData.ambientParticles.splice(i, 1); continue; }
    const asx = ap.x - sceneData.camX + w / 2;
    const asy = ap.y - sceneData.camY + h / 2;
    if (asx < -10 || asx > w + 10 || asy < -10 || asy > h + 10) continue;
    ctx.globalAlpha = ap.life * 0.6;
    ctx.fillStyle = ap.color;
    ctx.fillRect(asx, asy, ap.size, ap.size);
  }
  ctx.globalAlpha = 1;

  // ══════════════════════════════════════
  // TRANSIENT PARTICLES (scan scatter etc)
  // ══════════════════════════════════════
  // Cap particles
  while (sceneData.particles.length > 500) sceneData.particles.shift();

  for (let i = sceneData.particles.length - 1; i >= 0; i--) {
    const p = sceneData.particles[i];
    p.progress = Math.min(1, p.progress + 0.025 * p.speed);
    p.life -= p.decay;
    if (p.life <= 0) { sceneData.particles.splice(i, 1); continue; }

    const ppx = p.x + (p.tx - p.x) * p.progress;
    const ppy = p.y + (p.ty - p.y) * p.progress;
    const psx = ppx - sceneData.camX + w / 2;
    const psy = ppy - sceneData.camY + h / 2;
    if (psx < -10 || psx > w + 10 || psy < -10 || psy > h + 10) continue;

    const isRed = p.color === '#FF2244';
    ctx.globalAlpha = p.life * (isRed ? 0.5 + Math.sin(now * 0.012 + i) * 0.5 : 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(psx, psy, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Restore zoom
  ctx.restore();

  // ══════════════════════════════════════
  // MINIMAP (top-right corner, shows room plan)
  // ══════════════════════════════════════
  const mmLoc = G ? currentLocation() : null;
  const mmLayout = mmLoc ? getLocationLayout(mmLoc) : null;
  if (G && mmLayout) {
    const layout = mmLayout, loc = mmLoc;
    const mmW = 80, mmH = 60;
    const mmX = w - mmW - 6, mmY = 6;
    const mmPad = 3;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(mmX, mmY, mmW, mmH);
    ctx.strokeStyle = 'rgba(0,255,65,0.3)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(mmX, mmY, mmW, mmH);

    // Scale rooms to fit minimap
    const bw = layout.buildingW, bh = layout.buildingH;
    const scX = (mmW - mmPad*2) / bw, scY = (mmH - mmPad*2) / bh;
    const sc = Math.min(scX, scY);
    const ofsX = mmX + mmPad + (mmW - mmPad*2 - bw*sc)/2 - (layout.cx - bw/2)*sc;
    const ofsY = mmY + mmPad + (mmH - mmPad*2 - bh*sc)/2 - (layout.cy - bh/2)*sc;

    const currentFloor = G.world.currentFloor || 0;
    for (const lr of layout.rooms) {
      if (lr.floorNum !== currentFloor) continue;
      const rx = lr.cx * sc + ofsX - lr.w/2 * sc;
      const ry = lr.cy * sc + ofsY - lr.h/2 * sc;
      const rw = lr.w * sc, rh = lr.h * sc;

      const isCur = lr.idx === G.world.currentRoom;
      const gameRoom = loc.rooms[lr.idx];
      const hasZ = gameRoom?.zombies?.currentHp > 0;

      // Room fill
      ctx.fillStyle = isCur ? 'rgba(0,229,255,0.25)' : hasZ ? 'rgba(255,34,68,0.15)' : 'rgba(0,255,65,0.1)';
      ctx.fillRect(rx, ry, rw, rh);
      // Room border
      ctx.strokeStyle = isCur ? '#00E5FF' : hasZ ? '#661122' : 'rgba(0,255,65,0.3)';
      ctx.lineWidth = isCur ? 1 : 0.5;
      ctx.strokeRect(rx, ry, rw, rh);
    }

    // Player dot on minimap
    const pmmx = sceneData.playerX * sc + ofsX;
    const pmmy = sceneData.playerY * sc + ofsY;
    ctx.fillStyle = '#00FF41';
    ctx.beginPath(); ctx.arc(pmmx, pmmy, 2, 0, Math.PI*2); ctx.fill();

    // Zombie dots
    for (const z of sceneData.zombieEntities) {
      const zmx = z.x * sc + ofsX, zmy = z.y * sc + ofsY;
      ctx.fillStyle = '#FF2244';
      ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(zmx, zmy, 1.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ══════════════════════════════════════
  // POST-PROCESSING (screen-space)
  // ══════════════════════════════════════

  // Screen vignette — darker corners
  const vigGrad = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.35, w / 2, h / 2, Math.max(w, h) * 0.7);
  vigGrad.addColorStop(0, 'transparent');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, w, h);

  // CRT scanline sweeping down
  sceneData.scanLineY = (now * 0.03) % h;
  ctx.globalAlpha = 0.02;
  ctx.fillStyle = '#00FF41';
  ctx.fillRect(0, sceneData.scanLineY, w, 1.5);
  ctx.globalAlpha = 1;

  // Subtle vignette darkness at edges (lighter than fog of war)
  const isNight = G && (G.time.hour >= 21 || G.time.hour < 5);
  if (isNight) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, w, h);
  }

  // Auto-scan pulse every 4 seconds
  if (G && G.player.alive && now - (sceneData._lastAutoScan || 0) > 4000) {
    sceneData._lastAutoScan = now;
    sceneData.scanWaves.push({
      x: sceneData.playerX, y: sceneData.playerY,
      radius: 0, maxRadius: 200, speed: 1.5, alpha: 0.2,
      color: '#00FF41', life: 1
    });
  }

  // Occasional horizontal glitch line
  if (Math.random() < 0.02) {
    sceneData.glitchFrames = 2;
    sceneData.glitchY = Math.random() * h;
    sceneData.glitchW = 30 + Math.random() * 100;
    sceneData.glitchX = Math.random() * (w - sceneData.glitchW);
  }
  if (sceneData.glitchFrames > 0) {
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#00FF41';
    ctx.fillRect(sceneData.glitchX, sceneData.glitchY, sceneData.glitchW, 1);
    sceneData.glitchFrames--;
    ctx.globalAlpha = 1;
  }

  animId = requestAnimationFrame(animLoop);
}
